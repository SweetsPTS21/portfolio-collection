<svg viewBox="0 0 80 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Butterfly 1 (pink) -->
  <g transform="translate(15, 20)">
    <ellipse cx="0" cy="0" rx="8" ry="10" fill="#FFB8C8" opacity="0.7" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="6" ry="8" fill="#FF8ABF" opacity="0.5" transform="rotate(-20) translate(2,-2)"/>
    <ellipse cx="8" cy="2" rx="6" ry="8" fill="#FFB8C8" opacity="0.6" transform="rotate(15)"/>
    <ellipse cx="8" cy="2" rx="4" ry="6" fill="#FF8ABF" opacity="0.4" transform="rotate(15) translate(1,-1)"/>
    <ellipse cx="4" cy="4" rx="1.5" ry="5" fill="#3D2244" opacity="0.6"/>
    <circle cx="4" cy="-1" r="1.5" fill="#3D2244" opacity="0.5"/>
  </g>
  <!-- Butterfly 2 (lavender) -->
  <g transform="translate(55, 15)">
    <ellipse cx="0" cy="0" rx="6" ry="8" fill="#D8B8FF" opacity="0.65" transform="rotate(-25)"/>
    <ellipse cx="0" cy="0" rx="4" ry="6" fill="#C7A0FF" opacity="0.45" transform="rotate(-25) translate(1,-1)"/>
    <ellipse cx="6" cy="1" rx="5" ry="7" fill="#D8B8FF" opacity="0.6" transform="rotate(10)"/>
    <ellipse cx="6" cy="1" rx="3" ry="5" fill="#C7A0FF" opacity="0.4" transform="rotate(10) translate(1,-1)"/>
    <ellipse cx="3" cy="3" rx="1" ry="4" fill="#3D2244" opacity="0.5"/>
    <circle cx="3" cy="-1" r="1.2" fill="#3D2244" opacity="0.45"/>
  </g>
</svg>
