<svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cloud bed -->
  <ellipse cx="50" cy="62" rx="38" ry="14" fill="white" opacity="0.9"/>
  <ellipse cx="35" cy="58" rx="22" ry="12" fill="white" opacity="0.85"/>
  <ellipse cx="65" cy="59" rx="20" ry="11" fill="white"/>
  <!-- Body curled -->
  <ellipse cx="50" cy="48" rx="22" ry="16" fill="#FFF5F9" stroke="#FFD6E8" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="38" cy="40" r="14" fill="#FFFFFF" stroke="#FFD6E8" stroke-width="1.5"/>
  <!-- Ears folded -->
  <ellipse cx="30" cy="28" rx="5" ry="12" fill="#FFD6E8" stroke="#FF8ABF" stroke-width="1" transform="rotate(-15 30 28)"/>
  <ellipse cx="42" cy="26" rx="5" ry="12" fill="#FFD6E8" stroke="#FF8ABF" stroke-width="1" transform="rotate(10 42 26)"/>
  <!-- Closed eyes (lines) -->
  <path d="M33 40 Q35 42 37 40" stroke="#3D2244" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M41 39 Q43 41 45 39" stroke="#3D2244" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <circle cx="30" cy="43" r="2.5" fill="#FFD6E8" opacity="0.5"/>
  <!-- Zzz -->
  <text x="62" y="30" font-size="8" fill="#D8B8FF" opacity="0.6" font-weight="bold">z</text>
  <text x="68" y="24" font-size="6" fill="#D8B8FF" opacity="0.4" font-weight="bold">z</text>
  <text x="73" y="19" font-size="5" fill="#D8B8FF" opacity="0.3" font-weight="bold">z</text>
</svg>
