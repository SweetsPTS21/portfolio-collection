  <ellipse cx="85" cy="16" rx="3" ry="2" fill="#7EEDC8" opacity="0.5" transform="rotate(20 85 16)"/>
  <!-- Heart lock -->
  <path d="M58 50 C58 47 60 45 62 45 C64 45 66 47 66 50 C66 53 62 56 62 56 C62 56 58 53 58 50Z" fill="#FF8ABF" opacity="0.5"/>
