  <rect x="102" y="20" width="8" height="75" rx="4" fill="#C8A070" opacity="0.6"/>
  <!-- Gate arch -->
  <path d="M14 20 Q60 -5 106 20" stroke="#C8A070" stroke-width="4" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Gate planks -->
  <rect x="24" y="30" width="6" height="50" rx="3" fill="#FFD6E8" opacity="0.5"/>
  <rect x="36" y="25" width="6" height="55" rx="3" fill="#FFD6E8" opacity="0.45"/>
  <rect x="48" y="22" width="6" height="58" rx="3" fill="#FFD6E8" opacity="0.5"/>
  <rect x="60" y="22" width="6" height="58" rx="3" fill="#FFD6E8" opacity="0.5"/>
  <rect x="72" y="25" width="6" height="55" rx="3" fill="#FFD6E8" opacity="0.45"/>
  <rect x="84" y="30" width="6" height="50" rx="3" fill="#FFD6E8" opacity="0.5"/>
  <!-- Horizontal rails -->
  <rect x="20" y="40" width="76" height="3" rx="1.5" fill="#C8A070" opacity="0.4"/>
  <rect x="20" y="60" width="76" height="3" rx="1.5" fill="#C8A070" opacity="0.4"/>
