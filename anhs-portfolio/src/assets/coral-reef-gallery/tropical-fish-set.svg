    <path d="M20 5 C25 5 28 10 28 15 C28 20 25 25 20 28 C18 29 16 28 16 26 L16 22 C14 22 12 20 12 18 C12 15 14 12 16 10 C17 8 18 6 20 5Z" fill="#5EEBC4" opacity="0.8"/>
