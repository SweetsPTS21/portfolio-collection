  <ellipse cx="10" cy="17" rx="4" ry="5.5" fill="#FFD1D8" transform="rotate(-144 10 17)"/>
  <ellipse cx="18" cy="17" rx="4" ry="5.5" fill="#FFD1D8" transform="rotate(144 18 17)"/>
  <ellipse cx="20" cy="11" rx="4" ry="5.5" fill="#FFD1D8" transform="rotate(72 20 11)"/>
  <!-- Center -->
  <circle cx="14" cy="13" r="4" fill="#FFE17A"/>
  <circle cx="13" cy="12" r="1" fill="rgba(255,255,255,0.5)"/>
</svg>
