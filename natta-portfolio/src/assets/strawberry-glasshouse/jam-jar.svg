<svg width="80" height="120" viewBox="0 0 80 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cork -->
  <rect x="20" y="5" width="40" height="15" rx="4" fill="#D4A574"/>
  <line x1="25" y1="10" x2="55" y2="10" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="25" y1="14" x2="55" y2="14" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Rope -->
  <path d="M15 22 Q40 18, 65 22" stroke="rgba(180,140,80,0.5)" stroke-width="1.5" fill="none"/>
  <!-- Body -->
  <rect x="10" y="20" width="60" height="85" rx="12" fill="rgba(255,255,255,0.6)" stroke="rgba(255,160,171,0.3)" stroke-width="1"/>
  <!-- Shine -->
