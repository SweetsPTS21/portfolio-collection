  <!-- Berries inside -->
  <ellipse cx="35" cy="80" rx="6" ry="7" fill="rgba(255,160,171,0.4)"/>
  <ellipse cx="50" cy="85" rx="5" ry="6" fill="rgba(255,138,154,0.3)"/>
  <ellipse cx="30" cy="90" rx="5" ry="6" fill="rgba(255,107,125,0.3)"/>
  <!-- Label -->
  <rect x="22" y="105" width="36" height="12" rx="6" fill="rgba(255,209,216,0.5)" stroke="rgba(255,160,171,0.3)" stroke-width="0.5"/>
</svg>
