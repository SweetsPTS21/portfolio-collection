<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <defs>
    <linearGradient id="redCap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="purpleCap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="greenCap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <!-- Large red mushroom -->
  <rect x="72" y="100" width="16" height="60" rx="6" fill="#D4A574"/>
  <ellipse cx="80" cy="100" rx="40" ry="30" fill="url(#redCap)"/>
  <circle cx="68" cy="88" r="4" fill="white" opacity="0.8"/>
  <circle cx="88" cy="82" r="3" fill="white" opacity="0.8"/>
  <circle cx="75" cy="105" r="3.5" fill="white" opacity="0.7"/>
  <circle cx="92" cy="95" r="2.5" fill="white" opacity="0.7"/>
  <!-- Medium purple mushroom -->
  <rect x="128" y="120" width="12" height="45" rx="5" fill="#C9A96E"/>
  <ellipse cx="134" cy="120" rx="28" ry="22" fill="url(#purpleCap)"/>
  <ellipse cx="134" cy="120" rx="28" ry="22" fill="none" stroke="#C084FC" stroke-width="1" opacity="0.5"/>
  <circle cx="125" cy="112" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="140" cy="108" r="2" fill="white" opacity="0.6"/>
  <!-- Small green mushroom -->
  <rect x="42" y="140" width="8" height="30" rx="3" fill="#D4A574"/>
  <ellipse cx="46" cy="140" rx="18" ry="14" fill="url(#greenCap)"/>
  <circle cx="42" cy="135" r="2" fill="white" opacity="0.5"/>
  <circle cx="50" cy="133" r="1.5" fill="white" opacity="0.5"/>
  <!-- Tiny mushroom -->
  <rect x="160" y="150" width="6" height="20" rx="2" fill="#C9A96E"/>
  <ellipse cx="163" cy="150" rx="12" ry="10" fill="url(#redCap)" opacity="0.8"/>
  <circle cx="160" cy="146" r="1.5" fill="white" opacity="0.6"/>
</svg>
