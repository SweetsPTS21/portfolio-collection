<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <pattern id="mossPattern" patternUnits="userSpaceOnUse" width="100" height="100">
      <!-- Moss dots -->
      <circle cx="10" cy="15" r="2" fill="#86EFAC" opacity="0.3"/>
      <circle cx="45" cy="8" r="1.5" fill="#4ADE80" opacity="0.25"/>
      <circle cx="80" cy="20" r="2.5" fill="#86EFAC" opacity="0.2"/>
      <circle cx="25" cy="45" r="1.8" fill="#4ADE80" opacity="0.3"/>
      <circle cx="65" cy="40" r="2" fill="#86EFAC" opacity="0.25"/>
      <circle cx="90" cy="55" r="1.5" fill="#4ADE80" opacity="0.2"/>
      <circle cx="15" cy="70" r="2.2" fill="#86EFAC" opacity="0.28"/>
      <circle cx="50" cy="65" r="1.8" fill="#4ADE80" opacity="0.22"/>
      <circle cx="75" cy="75" r="2" fill="#86EFAC" opacity="0.3"/>
      <circle cx="35" cy="90" r="1.5" fill="#4ADE80" opacity="0.25"/>
      <circle cx="60" cy="92" r="2.5" fill="#86EFAC" opacity="0.2"/>
      <circle cx="5" cy="95" r="1.2" fill="#4ADE80" opacity="0.28"/>
      <!-- Moss patches -->
      <ellipse cx="30" cy="25" rx="5" ry="3" fill="#86EFAC" opacity="0.12"/>
      <ellipse cx="70" cy="60" rx="6" ry="3.5" fill="#4ADE80" opacity="0.1"/>
      <ellipse cx="20" cy="80" rx="4" ry="2.5" fill="#86EFAC" opacity="0.12"/>
      <ellipse cx="85" cy="35" rx="5" ry="2.8" fill="#4ADE80" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#mossPattern)"/>
</svg>
