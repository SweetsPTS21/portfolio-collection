  <ellipse cx="50" cy="40" rx="12" ry="18" fill="#C084FC" opacity="0.4"/>
  <ellipse cx="32" cy="42" rx="8" ry="12" fill="#E9D5FF" opacity="0.5"/>
  <ellipse cx="48" cy="42" rx="8" ry="12" fill="#E9D5FF" opacity="0.5"/>
  <!-- Body (sitting) -->
  <ellipse cx="40" cy="55" rx="7" ry="12" fill="#FDE68A"/>
  <!-- Legs -->
  <path d="M35 62 Q33 70 36 72" stroke="#FECACA" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M45 62 Q47 70 44 72" stroke="#FECACA" stroke-width="3" fill="none" stroke-linecap="round"/>
