  <!-- Waving hand -->
  <path d="M52 48 Q56 44 58 40" stroke="#FECACA" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="58" cy="39" r="2.5" fill="#FECACA"/>
