  <path d="M25 108 Q28 105 31 108 Q28 111 25 108Z" fill="#166534" opacity="0.4"/>
  <path d="M170 120 Q173 117 176 120 Q173 123 170 120Z" fill="#166534" opacity="0.4"/>
  <path d="M95 25 Q98 22 101 25 Q98 28 95 25Z" fill="#166534" opacity="0.4"/>
