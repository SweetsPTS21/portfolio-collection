  <line x1="60" y1="100" x2="60" y2="220" stroke="#78350F" stroke-width="0.8" opacity="0.5"/>
  <line x1="80" y1="90" x2="80" y2="220" stroke="#78350F" stroke-width="0.8" opacity="0.5"/>
  <line x1="125" y1="95" x2="125" y2="220" stroke="#78350F" stroke-width="0.8" opacity="0.5"/>
  <line x1="142" y1="100" x2="142" y2="220" stroke="#78350F" stroke-width="0.8" opacity="0.5"/>
  <!-- Door handles -->
  <circle cx="92" cy="155" r="3" fill="#FBBF24" opacity="0.8"/>
  <circle cx="112" cy="155" r="3" fill="#FBBF24" opacity="0.8"/>
  <!-- Ivy on left -->
  <circle cx="28" cy="100" r="5" fill="#4ADE80" opacity="0.7"/>
  <circle cx="25" cy="115" r="4" fill="#4ADE80" opacity="0.6"/>
  <circle cx="30" cy="130" r="5.5" fill="#4ADE80" opacity="0.7"/>
  <circle cx="27" cy="148" r="4" fill="#4ADE80" opacity="0.6"/>
  <circle cx="32" cy="165" r="5" fill="#4ADE80" opacity="0.65"/>
  <!-- Ivy on right -->
  <circle cx="172" cy="95" r="5" fill="#4ADE80" opacity="0.7"/>
  <circle cx="175" cy="112" r="4.5" fill="#4ADE80" opacity="0.6"/>
  <circle cx="170" cy="128" r="5" fill="#4ADE80" opacity="0.7"/>
  <circle cx="173" cy="145" r="4" fill="#4ADE80" opacity="0.6"/>
  <!-- Ivy on top -->
  <circle cx="60" cy="50" r="4" fill="#4ADE80" opacity="0.65"/>
  <circle cx="80" cy="35" r="4.5" fill="#4ADE80" opacity="0.7"/>
  <circle cx="100" cy="28" r="5" fill="#4ADE80" opacity="0.7"/>
  <circle cx="120" cy="35" r="4.5" fill="#4ADE80" opacity="0.65"/>
  <circle cx="140" cy="50" r="4" fill="#4ADE80" opacity="0.6"/>
