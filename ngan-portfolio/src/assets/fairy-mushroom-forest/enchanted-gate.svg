<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Arch frame -->
  <path d="M30 220 L30 80 Q100 10 170 80 L170 220" fill="none" stroke="#92400E" stroke-width="10" stroke-linecap="round"/>
  <!-- Inner arch -->
  <path d="M40 220 L40 85 Q100 25 160 85 L160 220" fill="none" stroke="#B45309" stroke-width="4"/>
  <!-- Left door -->
  <path d="M45 220 L45 90 Q75 45 100 90 L100 220Z" fill="#92400E" opacity="0.7"/>
