<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" fill="none">
  <!-- Playing kitty - batting at yarn ball -->
  <!-- Body upright -->
  <ellipse cx="80" cy="120" rx="32" ry="35" fill="#E8F4FD" stroke="#8ECDF6" stroke-width="2"/>
  <!-- Head -->
  <circle cx="80" cy="70" r="28" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="2"/>
  <!-- Ears -->
  <path d="M58 48 L63 30 L72 46 Z" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <path d="M88 46 L97 30 L102 48 Z" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <path d="M60 47 L64 34 L70 46 Z" fill="#FFB8C8" opacity="0.5"/>
  <path d="M90 46 L96 34 L100 47 Z" fill="#FFB8C8" opacity="0.5"/>
  <!-- Wide excited eyes -->
  <circle cx="72" cy="68" r="5" fill="#24384A"/>
  <circle cx="88" cy="68" r="5" fill="#24384A"/>
  <circle cx="70" cy="66" r="2" fill="#FFFFFF"/>
  <circle cx="86" cy="66" r="2" fill="#FFFFFF"/>
  <!-- Open mouth excited -->
  <ellipse cx="80" cy="80" rx="4" ry="3" fill="#FF8E9E" opacity="0.7"/>
  <!-- Raised paw batting -->
  <path d="M48 105 Q38 90 42 80 Q44 75 50 78" stroke="#8ECDF6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="48" cy="77" rx="7" ry="5" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <!-- Yarn ball -->
  <circle cx="35" cy="68" r="10" fill="#FF8E9E" opacity="0.8"/>
  <path d="M28 65 Q35 60 42 65 Q35 70 28 65" stroke="#FFB8C8" stroke-width="1" fill="none"/>
  <path d="M32 60 Q35 68 38 60" stroke="#FFB8C8" stroke-width="1" fill="none"/>
  <!-- Tail up excited -->
  <path d="M112 115 Q130 100 125 80 Q122 70 128 62" stroke="#8ECDF6" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Back paws -->
  <ellipse cx="68" cy="152" rx="10" ry="6" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <ellipse cx="92" cy="152" rx="10" ry="6" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
</svg>
