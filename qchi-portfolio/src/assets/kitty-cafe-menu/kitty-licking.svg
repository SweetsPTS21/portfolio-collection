<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 170" fill="none">
  <!-- Kitty sitting and licking paw -->
  <!-- Body sitting -->
  <ellipse cx="80" cy="115" rx="30" ry="35" fill="#E8F4FD" stroke="#8ECDF6" stroke-width="2"/>
  <!-- Head tilted slightly -->
  <circle cx="75" cy="62" r="26" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="2"/>
  <!-- Ears -->
  <path d="M55 42 L60 26 L68 40 Z" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <path d="M80 38 L88 22 L94 40 Z" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <path d="M57 41 L61 30 L66 40 Z" fill="#FFB8C8" opacity="0.5"/>
  <path d="M82 38 L87 26 L92 39 Z" fill="#FFB8C8" opacity="0.5"/>
  <!-- Half-closed content eyes -->
  <path d="M64 60 Q68 57 72 60" stroke="#24384A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M78 58 Q82 55 86 58" stroke="#24384A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="75" cy="67" rx="2.5" ry="2" fill="#FF8E9E"/>
  <!-- Tongue out licking -->
  <path d="M73 70 Q75 75 77 70" fill="#FF8E9E" opacity="0.8"/>
  <!-- Raised paw being licked -->
  <path d="M55 85 Q45 75 48 65 Q50 60 55 62" stroke="#8ECDF6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="53" cy="62" rx="7" ry="5" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <!-- Paw beans on raised paw -->
  <circle cx="50" cy="61" r="1.8" fill="#FFB8C8" opacity="0.6"/>
  <circle cx="55" cy="60" r="1.8" fill="#FFB8C8" opacity="0.6"/>
  <circle cx="52" cy="64" r="1.5" fill="#FFB8C8" opacity="0.6"/>
  <!-- Tail wrapped around -->
  <path d="M110 110 Q125 95 120 80 Q118 72 122 65" stroke="#8ECDF6" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Back paws -->
  <ellipse cx="68" cy="148" rx="10" ry="6" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <ellipse cx="92" cy="148" rx="10" ry="6" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
</svg>
