<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <!-- Board frame -->
  <rect x="20" y="20" width="260" height="160" rx="12" fill="#3A4F5E" stroke="#24384A" stroke-width="3"/>
  <!-- Inner chalk area -->
  <rect x="30" y="30" width="240" height="140" rx="8" fill="#2D4050" opacity="0.9"/>
  <!-- Chalk doodles -->
  <path d="M50 50 Q70 45 90 50" stroke="#CFEAFF" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M200 55 L220 55 L210 45 Z" stroke="#FFE3A8" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="250" cy="50" r="4" stroke="#9FE3D0" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Menu lines -->
  <line x1="50" y1="80" x2="180" y2="80" stroke="#CFEAFF" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="50" y1="100" x2="160" y2="100" stroke="#CFEAFF" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <line x1="50" y1="120" x2="170" y2="120" stroke="#CFEAFF" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="50" y1="140" x2="150" y2="140" stroke="#CFEAFF" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <!-- Tiny cat doodle -->
  <circle cx="240" cy="130" r="10" stroke="#FFE3A8" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M233 122 L235 116 L238 122" stroke="#FFE3A8" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M242 122 L245 116 L247 122" stroke="#FFE3A8" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="237" cy="129" r="1.5" fill="#FFE3A8" opacity="0.5"/>
  <circle cx="243" cy="129" r="1.5" fill="#FFE3A8" opacity="0.5"/>
  <!-- Hanging hooks -->
  <rect x="80" y="12" width="4" height="14" rx="2" fill="#6B879D"/>
  <rect x="216" y="12" width="4" height="14" rx="2" fill="#6B879D"/>
</svg>
