<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100" fill="none">
  <!-- Peeking kitty - only head and paws visible from bottom edge -->
  <!-- Surface/edge the kitty peeks over -->
  <rect x="0" y="60" width="140" height="40" fill="#E8F4FD" rx="8" opacity="0.5"/>
  <!-- Head peeking up -->
  <circle cx="70" cy="48" r="26" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="2"/>
  <!-- Ears -->
  <path d="M50 28 L55 12 L64 26 Z" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <path d="M76 26 L85 12 L90 28 Z" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <path d="M52 27 L56 16 L62 26 Z" fill="#FFB8C8" opacity="0.5"/>
  <path d="M78 26 L84 16 L88 27 Z" fill="#FFB8C8" opacity="0.5"/>
  <!-- Big curious eyes -->
  <circle cx="62" cy="45" r="6" fill="#24384A"/>
  <circle cx="78" cy="45" r="6" fill="#24384A"/>
  <circle cx="60" cy="43" r="2.5" fill="#FFFFFF"/>
  <circle cx="76" cy="43" r="2.5" fill="#FFFFFF"/>
  <!-- Nose -->
  <ellipse cx="70" cy="54" rx="2.5" ry="2" fill="#FF8E9E"/>
  <!-- Whiskers -->
  <line x1="45" y1="50" x2="57" y2="52" stroke="#B9C8F6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="44" y1="56" x2="56" y2="55" stroke="#B9C8F6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="83" y1="52" x2="95" y2="50" stroke="#B9C8F6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="84" y1="55" x2="96" y2="56" stroke="#B9C8F6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Paws gripping the edge -->
  <ellipse cx="52" cy="64" rx="9" ry="6" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <ellipse cx="88" cy="64" rx="9" ry="6" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <!-- Paw beans -->
  <circle cx="48" cy="63" r="2" fill="#FFB8C8" opacity="0.6"/>
  <circle cx="54" cy="63" r="2" fill="#FFB8C8" opacity="0.6"/>
  <circle cx="51" cy="67" r="1.8" fill="#FFB8C8" opacity="0.6"/>
  <circle cx="84" cy="63" r="2" fill="#FFB8C8" opacity="0.6"/>
  <circle cx="90" cy="63" r="2" fill="#FFB8C8" opacity="0.6"/>
  <circle cx="87" cy="67" r="1.8" fill="#FFB8C8" opacity="0.6"/>
</svg>
