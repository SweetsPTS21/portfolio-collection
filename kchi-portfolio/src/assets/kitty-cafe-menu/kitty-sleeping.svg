<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 120" fill="none">
  <!-- Sleeping kitty - curled up -->
  <!-- Body curled -->
  <ellipse cx="90" cy="75" rx="50" ry="32" fill="#E8F4FD" stroke="#8ECDF6" stroke-width="2"/>
  <!-- Head resting -->
  <circle cx="55" cy="60" r="24" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="2"/>
  <!-- Ears -->
  <path d="M38 42 L43 28 L52 40 Z" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <path d="M56 38 L63 25 L68 40 Z" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <path d="M40 41 L44 32 L50 40 Z" fill="#FFB8C8" opacity="0.5"/>
  <path d="M57 39 L62 29 L66 40 Z" fill="#FFB8C8" opacity="0.5"/>
  <!-- Closed eyes - sleeping -->
  <path d="M45 58 Q49 55 53 58" stroke="#24384A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M58 56 Q62 53 66 56" stroke="#24384A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="55" cy="64" rx="2.5" ry="2" fill="#FF8E9E"/>
  <!-- Tail curled around body -->
  <path d="M140 70 Q150 55 145 45 Q140 38 132 42" stroke="#8ECDF6" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Paw tucked -->
  <ellipse cx="42" cy="80" rx="8" ry="5" fill="#FFFFFF" stroke="#8ECDF6" stroke-width="1.5"/>
  <!-- Zzz -->
  <text x="75" y="38" font-family="Nunito, sans-serif" font-size="12" font-weight="700" fill="#B9C8F6" opacity="0.7">z</text>
  <text x="85" y="30" font-family="Nunito, sans-serif" font-size="10" font-weight="700" fill="#B9C8F6" opacity="0.5">z</text>
  <text x="93" y="24" font-family="Nunito, sans-serif" font-size="8" font-weight="700" fill="#B9C8F6" opacity="0.4">z</text>
</svg>
