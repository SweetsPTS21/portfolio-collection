<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240" role="img" aria-labelledby="title desc">
  <title id="title">Horse carriage and street lantern set</title>
  <desc id="desc">A classic horse carriage, glowing street lamp, and lantern for a moonlit fairytale walk.</desc>
  <g id="carriage" transform="translate(46 44)">
    <ellipse cx="150" cy="88" rx="128" ry="70" fill="#1C244A" stroke="#F6D77B" stroke-width="7"/>
    <path d="M92 36c-22 32-20 72 0 108M150 20c-24 42-24 92 0 136M208 36c22 32 20 72 0 108" fill="none" stroke="#D8C7FF" stroke-width="6"/>
    <circle cx="86" cy="164" r="28" fill="#0D1638" stroke="#F6D77B" stroke-width="7"/>
    <circle cx="214" cy="164" r="28" fill="#0D1638" stroke="#F6D77B" stroke-width="7"/>
    <path id="horse" d="M290 142c28-34 62-34 90-8 16 14 30 14 44 8M336 160v42M388 154v48" fill="none" stroke="#F8F0D8" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g id="lantern" transform="translate(392 42)">
    <path d="M42 0v28" stroke="#35284A" stroke-width="6" stroke-linecap="round"/>
    <rect x="16" y="28" width="52" height="76" rx="18" fill="#182450" stroke="#F6D77B" stroke-width="7"/>
    <circle cx="42" cy="66" r="20" fill="#F6D77B" opacity=".72"/>
  </g>
  <path id="ribbon" d="M310 80c30-18 58-18 82 0" fill="none" stroke="#FFB8D0" stroke-width="10" stroke-linecap="round"/>
</svg>
