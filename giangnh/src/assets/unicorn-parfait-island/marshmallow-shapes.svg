<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="100%" height="100%">
  <!-- Twisted Marshmallow -->
  <g class="twist-marshmallow" transform="translate(10, 10)" filter="drop-shadow(0 4px 6px rgba(255, 163, 223, 0.15))">
    <rect x="5" y="15" width="40" height="20" rx="10" fill="#FCF5FF" stroke="#FFA3DF" stroke-width="1.5"/>
    <path d="M12,15 C18,22 18,28 12,35 M24,15 C30,22 30,28 24,35 M36,15 C42,22 42,28 36,35" fill="none" stroke="#FFE893" stroke-width="4" stroke-linecap="round"/>
    <path d="M18,15 C24,22 24,28 18,35 M30,15 C36,22 36,28 30,35" fill="none" stroke="#A3D8FF" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Cute Rabbit Marshmallow -->
  <g class="rabbit-marshmallow" transform="translate(70, 5)" filter="drop-shadow(0 4px 6px rgba(255, 163, 223, 0.15))">
    <!-- Body -->
    <ellipse cx="25" cy="30" rx="18" ry="16" fill="#FCF5FF" stroke="#FFA3DF" stroke-width="1.5"/>
    <!-- Ears -->
    <ellipse cx="16" cy="12" rx="5" ry="10" fill="#FCF5FF" stroke="#FFA3DF" stroke-width="1.5" transform="rotate(-15 16 12)"/>
    <ellipse cx="16" cy="12" rx="2" ry="6" fill="#FFA3DF" transform="rotate(-15 16 12)"/>
    
    <ellipse cx="34" cy="12" rx="5" ry="10" fill="#FCF5FF" stroke="#FFA3DF" stroke-width="1.5" transform="rotate(15 34 12)"/>
    <ellipse cx="34" cy="12" rx="2" ry="6" fill="#FFA3DF" transform="rotate(15 34 12)"/>
    
    <!-- Cheeks -->
    <circle cx="14" cy="30" r="3" fill="#FFA3DF" opacity="0.6"/>
    <circle cx="36" cy="30" r="3" fill="#FFA3DF" opacity="0.6"/>
    <!-- Eyes -->
    <circle cx="19" cy="26" r="1.5" fill="#441D35"/>
    <circle cx="31" cy="26" r="1.5" fill="#441D35"/>
    <!-- Mouth -->
    <path d="M23,31 Q25,33 27,31" fill="none" stroke="#441D35" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Marshmallow Sweet Heart -->
  <g class="heart-marshmallow" transform="translate(15, 65)" filter="drop-shadow(0 4px 6px rgba(255, 163, 223, 0.15))">
    <path d="M20,10 C12,0 0,6 0,20 C0,32 16,40 20,44 C24,40 40,32 40,20 C40,6 28,0 20,10 Z" fill="#FFA3DF" stroke="#FCF5FF" stroke-width="2"/>
    <path d="M20,14 C15,5 5,10 5,20 C5,29 17,35 20,38 C23,35 35,29 35,20 C35,10 25,5 20,14 Z" fill="#FCF5FF"/>
  </g>

  <!-- Marshmallow Star -->
  <g class="star-marshmallow" transform="translate(85, 60)" filter="drop-shadow(0 4px 6px rgba(255, 232, 147, 0.2))">
    <path d="M20,2 L26,14 L39,16 L30,25 L32,38 L20,32 L8,38 L10,25 L1,16 L14,14 Z" fill="#FFE893" stroke="#FCF5FF" stroke-width="2"/>
    <!-- Little face -->
    <circle cx="16" cy="21" r="1.2" fill="#441D35"/>
    <circle cx="24" cy="21" r="1.2" fill="#441D35"/>
    <ellipse cx="14" cy="23" rx="2" ry="1.2" fill="#FFA3DF" opacity="0.7"/>
    <ellipse cx="26" cy="23" rx="2" ry="1.2" fill="#FFA3DF" opacity="0.7"/>
    <path d="M19,25 Q20,26 21,25" fill="none" stroke="#441D35" stroke-width="1"/>
  </g>
</svg>
