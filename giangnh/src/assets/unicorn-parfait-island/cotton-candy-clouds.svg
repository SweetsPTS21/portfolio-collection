<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="100%" height="100%">
  <!-- Cloud Group 1 (Pink Pastel Cotton Candy) -->
  <g class="pink-cotton-cloud" fill="url(#pink-cotton-grad)" filter="drop-shadow(0 6px 10px rgba(255, 163, 223, 0.2))">
    <ellipse cx="60" cy="70" rx="25" ry="20" />
    <ellipse cx="90" cy="60" rx="35" ry="28" />
    <ellipse cx="125" cy="72" rx="28" ry="22" />
    <rect x="50" y="65" width="85" height="28" rx="14" />
  </g>
  
  <!-- Cloud Group 2 (Cyan/Blue Pastel Cotton Candy) -->
  <g class="blue-cotton-cloud" fill="url(#blue-cotton-grad)" filter="drop-shadow(0 6px 10px rgba(163, 216, 255, 0.2))" opacity="0.85" transform="translate(40, -25) scale(0.75)">
    <ellipse cx="60" cy="70" rx="25" ry="20" />
    <ellipse cx="95" cy="55" rx="38" ry="30" />
    <ellipse cx="130" cy="70" rx="26" ry="20" />
    <rect x="50" y="60" width="85" height="28" rx="14" />
  </g>

  <!-- Sweet Sparkle Dots -->
  <g fill="#FCF5FF" opacity="0.9">
    <circle cx="95" cy="52" r="3" />
    <circle cx="120" cy="65" r="2" />
    <circle cx="55" cy="72" r="2.5" />
    <path d="M35,62 Q38,62 38,59 Q38,62 41,62 Q38,62 38,65 Q38,62 35,62" fill="#FFE893"/>
  </g>

  <defs>
    <linearGradient id="pink-cotton-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCF5FF" />
      <stop offset="60%" stop-color="#FFA3DF" />
      <stop offset="100%" stop-color="#D5B3FF" />
    </linearGradient>
    <linearGradient id="blue-cotton-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCF5FF" />
      <stop offset="60%" stop-color="#A3D8FF" />
      <stop offset="100%" stop-color="#8EECD4" />
    </linearGradient>
  </defs>
</svg>
