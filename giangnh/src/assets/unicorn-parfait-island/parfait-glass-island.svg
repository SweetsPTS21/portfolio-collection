<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="100%" height="100%">
  <!-- Sky glow behind -->
  <circle cx="150" cy="180" r="110" fill="#FCF5FF" filter="blur(20px)" opacity="0.6"/>

  <!-- Rainbow Bridge Arch (representing sweet rainbow highway) -->
  <path d="M40,240 Q150,140 260,240" fill="none" stroke="url(#rainbow-bridge-grad)" stroke-width="8" opacity="0.6" stroke-linecap="round"/>

  <!-- Parfait Layers (inside glass container) -->
  <g class="jelly-layers">
    <!-- Bottom Purple Jelly Layer -->
    <path d="M110,290 L190,290 L180,330 L120,330 Z" fill="#D5B3FF" opacity="0.85"/>
    
    <!-- Mint Cream Layer -->
    <path d="M102,250 L198,250 L190,290 L110,290 Z" fill="#8EECD4" opacity="0.9"/>
    
    <!-- Yellow Marshmallow Layer -->
    <path d="M94,200 L206,200 L198,250 L102,250 Z" fill="#FFE893" opacity="0.85"/>
    
    <!-- Top Sweet Pink Jelly Layer -->
    <path d="M85,150 L215,150 L206,200 L94,200 Z" fill="#FFA3DF" opacity="0.9"/>
    
    <!-- Whipped Cream Dollops on Top -->
    <path d="M80,150 Q90,135 105,150 Q120,135 135,150 Q150,130 165,150 Q180,135 195,150 Q210,135 220,150 Z" fill="#FCF5FF"/>
  </g>

  <!-- Parfait Glass Container (Frosted High-Opacity Glassmorphic Outline) -->
  <g class="parfait-glass" filter="drop-shadow(0 15px 25px rgba(68, 29, 53, 0.15))">
    <!-- Glass body -->
    <path d="M80,145 L220,145 L200,260 L180,335 C178,342 165,345 150,345 C135,345 122,342 120,335 L100,260 Z" 
          fill="rgba(255, 255, 255, 0.28)" stroke="rgba(255, 255, 255, 0.76)" stroke-width="3"/>
    
    <!-- Glass base/stand -->
    <path d="M150,345 L150,375" stroke="rgba(255, 255, 255, 0.76)" stroke-width="8"/>
    <ellipse cx="150" cy="380" rx="45" ry="12" fill="rgba(255, 255, 255, 0.35)" stroke="rgba(255, 255, 255, 0.76)" stroke-width="3"/>

    <!-- Shiny glass reflection lines -->
    <path d="M95,160 L108,240" stroke="#FCF5FF" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
    <path d="M205,160 L195,220" stroke="#FCF5FF" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Toppings on the island: Giant Cherry, Wafer stick and stars -->
  <g class="parfait-toppings">
    <!-- Giant Cherry -->
    <circle cx="150" cy="115" r="22" fill="#FF6B7D" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.15))"/>
    <path d="M150,97 C155,75 175,65 185,75" fill="none" stroke="#8A5477" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Cherry white shine -->
    <ellipse cx="143" cy="108" rx="5" ry="3" fill="#FCF5FF" transform="rotate(-30 143 108)"/>

    <!-- Wafer Stick -->
    <g transform="translate(190, 80) rotate(35)">
      <rect x="0" y="0" width="12" height="90" rx="4" fill="#FFE893" stroke="#8A5477" stroke-width="1.5"/>
      <path d="M0,15 L12,25 M0,35 L12,45 M0,55 L12,65 M0,75 L12,85" stroke="#FFA3DF" stroke-width="4"/>
    </g>

    <!-- Little Stars on Sticks -->
    <path d="M75,145 L65,115" stroke="#8A5477" stroke-width="1.5"/>
    <path d="M65,115 Q68,115 68,112 Q68,115 71,115 Q68,115 68,118 Q68,115 65,115" fill="#FFE893" stroke="#8A5477" stroke-width="1"/>
    
    <path d="M225,145 L235,110" stroke="#8A5477" stroke-width="1.5"/>
    <path d="M235,110 Q239,110 239,106 Q239,110 243,110 Q239,110 239,114 Q239,110 235,110" fill="#A3D8FF" stroke="#8A5477" stroke-width="1"/>
  </g>

  <!-- Sweet Clouds around base -->
  <ellipse cx="90" cy="375" rx="25" ry="12" fill="#FCF5FF" opacity="0.8"/>
  <ellipse cx="210" cy="375" rx="25" ry="12" fill="#FCF5FF" opacity="0.8"/>

  <defs>
    <linearGradient id="rainbow-bridge-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFA3DF" />
      <stop offset="25%" stop-color="#FFE893" />
      <stop offset="50%" stop-color="#8EECD4" />
      <stop offset="75%" stop-color="#A3D8FF" />
      <stop offset="100%" stop-color="#D5B3FF" />
    </linearGradient>
  </defs>
</svg>
