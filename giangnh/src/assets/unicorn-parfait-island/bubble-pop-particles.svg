<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Big Bubble -->
  <g class="bubble-large" transform="translate(10, 10)">
    <circle cx="30" cy="30" r="25" fill="url(#bubble-grad-1)" stroke="rgba(255, 255, 255, 0.8)" stroke-width="1.5"/>
    <ellipse cx="20" cy="18" rx="6" ry="3" fill="#FCF5FF" transform="rotate(-35 20 18)"/>
    <circle cx="42" cy="42" r="2" fill="#FCF5FF" opacity="0.6"/>
  </g>

  <!-- Medium Bubble -->
  <g class="bubble-medium" transform="translate(55, 45)">
    <circle cx="20" cy="20" r="16" fill="url(#bubble-grad-2)" stroke="rgba(255, 255, 255, 0.7)" stroke-width="1.2"/>
    <ellipse cx="14" cy="12" rx="4" ry="2" fill="#FCF5FF" transform="rotate(-35 14 12)"/>
  </g>

  <!-- Small Bubbles -->
  <g class="bubble-small-1" transform="translate(15, 68)">
    <circle cx="10" cy="10" r="8" fill="url(#bubble-grad-1)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="1"/>
    <circle cx="7" cy="7" r="1.5" fill="#FCF5FF" opacity="0.8"/>
  </g>
  
  <g class="bubble-small-2" transform="translate(68, 15)">
    <circle cx="8" cy="8" r="6" fill="url(#bubble-grad-2)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="1"/>
    <circle cx="6" cy="6" r="1.2" fill="#FCF5FF" opacity="0.8"/>
  </g>

  <defs>
    <radialGradient id="bubble-grad-1" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.5)" />
      <stop offset="40%" stop-color="rgba(163, 216, 255, 0.25)" />
      <stop offset="80%" stop-color="rgba(255, 163, 223, 0.3)" />
      <stop offset="100%" stop-color="rgba(213, 179, 255, 0.45)" />
    </radialGradient>
    <radialGradient id="bubble-grad-2" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.5)" />
      <stop offset="40%" stop-color="rgba(142, 236, 212, 0.25)" />
      <stop offset="80%" stop-color="rgba(255, 232, 147, 0.3)" />
      <stop offset="100%" stop-color="rgba(255, 163, 223, 0.4)" />
    </radialGradient>
  </defs>
</svg>
