<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" role="img" aria-labelledby="sunTitle sunDesc">
  <title id="sunTitle">Tropical Glowing Sun</title>
  <desc id="sunDesc">A cute warm tropical sun with soft glowing ray rings and diamond-shaped shiny sparkles.</desc>
  
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF0C9" />
      <stop offset="35%" stop-color="#FFD86B" />
      <stop offset="85%" stop-color="#FF7F9E" />
      <stop offset="100%" stop-color="#FF5F82" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing outer halo -->
  <circle cx="75" cy="75" r="55" fill="url(#sunGrad)" opacity="0.4" />
  <circle cx="75" cy="75" r="42" fill="url(#sunGrad)" opacity="0.75" filter="url(#softGlow)" />

  <!-- Core Sun Body -->
  <circle cx="75" cy="75" r="28" fill="#FFD86B" stroke="#FF7F9E" stroke-width="2" />
  <circle cx="72" cy="72" r="22" fill="#FFEFA8" />

  <!-- Sunbeams / Rays -->
  <g stroke="#FF7F9E" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6">
    <line x1="75" y1="24" x2="75" y2="12" />
    <line x1="75" y1="126" x2="75" y2="138" />
    <line x1="24" y1="75" x2="12" y2="75" />
    <line x1="126" y1="75" x2="138" y2="75" />
    
    <line x1="39" y1="39" x2="30" y2="30" />
    <line x1="111" y1="111" x2="120" y2="120" />
    <line x1="39" y1="111" x2="30" y2="120" />
    <line x1="111" y1="39" x2="120" y2="30" />
  </g>

  <!-- Twinkling Sparkles -->
  <g fill="#FFFFFF" opacity="0.8">
    <!-- Top-left sparkle -->
    <path d="M 25 45 Q 30 45, 30 40 Q 30 45, 35 45 Q 30 45, 30 50 Q 30 45, 25 45 Z" />
    <!-- Bottom-right sparkle -->
    <path d="M 115 105 Q 120 105, 120 100 Q 120 105, 125 105 Q 120 105, 120 110 Q 120 105, 115 105 Z" />
    <!-- Small center-left sparkle -->
    <path d="M 125 35 Q 128 35, 128 32 Q 128 35, 131 35 Q 128 35, 128 38 Q 128 35, 125 35 Z" transform="scale(0.8) translate(40, 10)" />
  </g>
</svg>
