<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="markerTitle markerDesc">
  <title id="markerTitle">Checkpoint Markers</title>
  <desc id="markerDesc">Cute nautical buoys, wood docks, and check flags used to indicate milestone achievements.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="4" stdDeviation="3" flood-color="#123E48" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Left: Nautical Buoy -->
  <g transform="translate(60, 100)" filter="url(#shadow)">
    <!-- Water base shadow -->
    <ellipse cx="0" cy="45" rx="35" ry="10" fill="#7CEAFF" opacity="0.6" />
    <ellipse cx="0" cy="45" rx="20" ry="6" fill="#27C6C2" opacity="0.4" />

    <!-- Anchor rope -->
    <line x1="0" y1="35" x2="0" y2="50" stroke="#7A6855" stroke-width="3" />

    <!-- Buoy body -->
    <!-- Red base -->
    <path d="M -20 20 C -20 40, 20 40, 20 20 L 15 -10 L -15 -10 Z" fill="#FF7F9E" />
    <!-- White stripe -->
    <path d="M -15 -10 L 15 -10 L 12 -25 L -12 -25 Z" fill="#FFFFFF" />
    <!-- Blue top cap -->
    <path d="M -12 -25 L 12 -25 L 8 -35 L -8 -35 Z" fill="#27C6C2" />

    <!-- Flagpole & Light on top -->
    <line x1="0" y1="-35" x2="0" y2="-55" stroke="#4F7D86" stroke-width="2.5" />
    <circle cx="0" cy="-57" r="4" fill="#FFD86B" />
  </g>

  <!-- Right: Wooden Dock with Marker Flag -->
  <g transform="translate(140, 100)" filter="url(#shadow)">
    <!-- Water ripples -->
    <ellipse cx="0" cy="45" rx="40" ry="10" fill="#7CEAFF" opacity="0.5" />

    <!-- Wooden Posts (Piles) -->
    <rect x="-25" y="10" width="10" height="35" rx="2" fill="#7A6855" />
    <rect x="15" y="5" width="10" height="40" rx="2" fill="#8C7660" />
    
    <!-- Ropes on posts -->
    <path d="M -25 20 C -10 25, 10 22, 15 15" stroke="#FFF0C9" stroke-width="2" fill="none" />

    <!-- Dock Platform (Plank) -->
    <polygon points="-35,15 35,10 30,22 -30,27" fill="#A08A75" stroke="#7A6855" stroke-width="1.5" />

    <!-- Marker Flag -->
    <line x1="20" y1="10" x2="20" y2="-40" stroke="#123E48" stroke-width="3" stroke-linecap="round" />
    <!-- Cute pink flag with heart/star -->
    <path d="M 20 -40 L -15 -27 L 20 -14 Z" fill="#FF7F9E" stroke="#FF5F82" stroke-width="1.5" />
    <circle cx="5" cy="-27" r="3" fill="#FFFFFF" />
  </g>
</svg>
