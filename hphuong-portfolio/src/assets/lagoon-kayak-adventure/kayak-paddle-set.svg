<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-labelledby="kayakTitle kayakDesc">
  <title id="kayakTitle">Kayak and Paddle Set</title>
  <desc id="kayakDesc">A cute, colorful kayak with dual oars/paddles and cartoonish water splash droplets.</desc>
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#123E48" flood-opacity="0.18" />
    </filter>
    <linearGradient id="kayakGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5F7E" />
      <stop offset="50%" stop-color="#FF7F9E" />
      <stop offset="100%" stop-color="#FFA8B8" />
    </linearGradient>
    <linearGradient id="paddleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD86B" />
      <stop offset="100%" stop-color="#FCD26B" />
    </linearGradient>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Splashes of water under kayak -->
    <path d="M 120 120 C 130 115, 140 115, 150 120 M 240 120 C 250 115, 260 115, 270 120" stroke="#7CEAFF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8" />
    <circle cx="110" cy="115" r="3" fill="#7CEAFF" opacity="0.8" />
    <circle cx="285" cy="115" r="4" fill="#7CEAFF" opacity="0.8" />
    <circle cx="170" cy="125" r="2.5" fill="#7CEAFF" opacity="0.8" />

    <!-- Kayak Body (Boat) -->
    <path d="M 50 100 C 110 80, 290 80, 350 100 C 290 120, 110 120, 50 100 Z" fill="url(#kayakGrad)" />

    <!-- Kayak Seat / Opening -->
    <ellipse cx="200" cy="100" rx="35" ry="10" fill="#123E48" opacity="0.85" />
    <ellipse cx="200" cy="98" rx="31" ry="8" fill="#4F7D86" />

    <!-- Dual Paddle Oars -->
    <g transform="translate(200, 100) rotate(15)">
      <!-- Paddle Shaft (Center Stick) -->
      <rect x="-120" y="-3" width="240" height="6" rx="3" fill="#7A6855" />
      <!-- Left Blade -->
      <path d="M -120 -8 C -135 -8, -150 -12, -150 0 C -150 12, -135 8, -120 8 Z" fill="url(#paddleGrad)" stroke="#E8C88D" stroke-width="1.5" />
      <line x1="-120" y1="0" x2="-140" y2="0" stroke="#7A6855" stroke-width="2" />
      
      <!-- Right Blade -->
      <path d="M 120 -8 C 135 -8, 150 -12, 150 0 C 150 12, 135 8, 120 8 Z" fill="url(#paddleGrad)" stroke="#E8C88D" stroke-width="1.5" />
      <line x1="120" y1="0" x2="140" y2="0" stroke="#7A6855" stroke-width="2" />
      
      <!-- Paddle drip rings -->
      <circle cx="-90" cy="0" r="5" fill="#FF7F9E" />
      <circle cx="90" cy="0" r="5" fill="#FF7F9E" />
    </g>
  </g>
</svg>
