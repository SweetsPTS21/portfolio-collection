<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="fishTitle fishDesc">
  <title id="fishTitle">Little Fish Darts</title>
  <desc id="fishDesc">Small cute orange and pink tropical fish darting quickly under the water leaving bubble trails.</desc>

  <g opacity="0.85">
    <!-- Fish 1 (Orange Teal Fin) - swimming top right -->
    <g transform="translate(60, 70) rotate(25)">
      <!-- Bubble trail -->
      <circle cx="-35" cy="5" r="2" fill="#FFFFFF" opacity="0.6" />
      <circle cx="-25" cy="2" r="3" fill="#FFFFFF" opacity="0.7" />
      <circle cx="-15" cy="1" r="1.5" fill="#FFFFFF" opacity="0.5" />

      <!-- Back fin (Tail) -->
      <polygon points="-12,0 -22,-8 -18,0 -22,8" fill="#27C6C2" />
      
      <!-- Body -->
      <path d="M -15 0 C -8 -8, 12 -8, 18 0 C 12 8, -8 8, -15 0 Z" fill="#FF9F43" />
      
      <!-- Eye -->
      <circle cx="10" cy="-2" r="2" fill="#123E48" />
      <circle cx="11" cy="-3" r="0.7" fill="#FFFFFF" />

      <!-- Side fin -->
      <path d="M 0 2 Q -5 8, -10 4 Z" fill="#27C6C2" />
    </g>

    <!-- Fish 2 (Pink Yellow Fin) - swimming left -->
    <g transform="translate(130, 130) rotate(-145)">
      <circle cx="-25" cy="2" r="2" fill="#FFFFFF" opacity="0.6" />
      <circle cx="-15" cy="1" r="1" fill="#FFFFFF" opacity="0.5" />

      <polygon points="-10,0 -18,-6 -15,0 -18,6" fill="#FFD86B" />
      <path d="M -12 0 C -6 -6, 10 -6, 15 0 C 10 6, -6 6, -12 0 Z" fill="#FF7F9E" />
      <circle cx="8" cy="-1.5" r="1.5" fill="#123E48" />
      
      <path d="M 0 1.5 Q -4 6, -8 3 Z" fill="#FFD86B" />
    </g>
  </g>
</svg>
