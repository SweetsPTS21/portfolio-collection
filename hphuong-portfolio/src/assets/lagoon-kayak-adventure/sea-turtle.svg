<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="turtleTitle turtleDesc">
  <title id="turtleTitle">Swimming Sea Turtle</title>
  <desc id="turtleDesc">A cute illustrated green sea turtle swimming slowly under the lagoon water.</desc>
  
  <defs>
    <filter id="waterGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#123E48" flood-opacity="0.1" />
    </filter>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#70E6A8" />
      <stop offset="50%" stop-color="#4FB680" />
      <stop offset="100%" stop-color="#2D8C59" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B9F3EE" />
      <stop offset="100%" stop-color="#70E6A8" />
    </linearGradient>
  </defs>

  <g filter="url(#waterGlow)" opacity="0.8">
    <!-- Flippers (Back) -->
    <path d="M 42 105 C 32 115, 25 110, 32 100 C 39 90, 48 95, 42 105 Z" fill="#4FB680" stroke="#123E48" stroke-width="1.5" />
    <path d="M 118 105 C 128 115, 135 110, 128 100 C 121 90, 112 95, 118 105 Z" fill="#4FB680" stroke="#123E48" stroke-width="1.5" />

    <!-- Flippers (Front) - Left -->
    <path d="M 38 60 C 18 55, 10 40, 22 36 C 34 32, 45 42, 42 55 Z" fill="url(#bodyGrad)" stroke="#123E48" stroke-width="2" />
    
    <!-- Flippers (Front) - Right -->
    <path d="M 122 60 C 142 55, 150 40, 138 36 C 126 32, 115 42, 118 55 Z" fill="url(#bodyGrad)" stroke="#123E48" stroke-width="2" />

    <!-- Head & Neck -->
    <path d="M 80 18 C 72 18, 68 28, 72 38 C 76 44, 84 44, 88 38 C 92 28, 88 18, 80 18 Z" fill="url(#bodyGrad)" stroke="#123E48" stroke-width="2" />
    <!-- Eyes -->
    <circle cx="75" cy="26" r="1.5" fill="#123E48" />
    <circle cx="85" cy="26" r="1.5" fill="#123E48" />

    <!-- Tail -->
    <polygon points="76,118 84,118 80,132" fill="#4FB680" stroke="#123E48" stroke-width="1.5" />

    <!-- Main Shell (Carapace) -->
    <path d="M 80 35 C 50 35, 40 50, 40 80 C 40 105, 55 120, 80 120 C 105 120, 120 105, 120 80 C 120 50, 110 35, 80 35 Z" 
          fill="url(#shellGrad)" stroke="#123E48" stroke-width="2.5" />
    
    <!-- Shell Plates (Costal/Vertebral Scutes) -->
    <g stroke="#123E48" stroke-width="1.5" fill="none" opacity="0.45">
      <!-- Center hexagons -->
      <polygon points="80,45 68,52 68,68 80,75 92,68 92,52" />
      <polygon points="80,75 68,82 68,98 80,105 92,98 92,82" />
      
      <!-- Connectors to edge -->
      <line x1="68" y1="52" x2="48" y2="48" />
      <line x1="92" y1="52" x2="112" y2="48" />
      <line x1="68" y1="68" x2="42" y2="70" />
      <line x1="92" y1="68" x2="118" y2="70" />
      <line x1="68" y1="82" x2="42" y2="85" />
      <line x1="92" y1="82" x2="118" y2="85" />
      <line x1="68" y1="98" x2="52" y2="110" />
      <line x1="92" y1="98" x2="108" y2="110" />
    </g>
  </g>
</svg>
