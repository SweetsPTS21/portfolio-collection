<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-labelledby="skyTitle skyDesc">
  <title id="skyTitle">Seagulls and Clouds Set</title>
  <desc id="skyDesc">Cute vector illustrations of cartoon seagulls gliding and fluffy white sky clouds.</desc>
  
  <defs>
    <!-- Soft Cloud Gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#E1F3FD" stop-opacity="0.75" />
    </linearGradient>
  </defs>

  <!-- Element 1: Cute Gliding Seagull (Left) -->
  <g id="seagull-one" transform="translate(80, 70)" stroke="#123E48" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Wings in wing-flap V-shape -->
    <path d="M -30 -10 Q -15 -25, 0 -8 Q 15 -25, 30 -10" fill="#FFFFFF" />
    <!-- Bird body & beak -->
    <path d="M -6 -8 Q 0 8, 6 -8" fill="#FFFFFF" />
    <!-- Tail fin -->
    <path d="M -3 3 L 0 8 L 3 3" />
    <!-- Golden beak -->
    <polygon points="-2,-8 2,-8 0,-14" fill="#FFD86B" stroke="#123E48" stroke-width="1.5" />
  </g>

  <!-- Element 2: Small Seagull (Far away) -->
  <g id="seagull-two" transform="translate(180, 40) scale(0.6)" stroke="#123E48" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M -20 -5 Q -10 -15, 0 -3 Q 10 -15, 20 -5" />
  </g>

  <!-- Element 3: Fluffy Cloud -->
  <g id="cloud-one" transform="translate(290, 100)">
    <!-- Cloud shape path -->
    <path d="M -50 15 
             C -65 15, -75 0, -60 -15 
             C -65 -35, -40 -45, -25 -35 
             C -15 -50, 15 -50, 25 -35 
             C 40 -45, 65 -35, 60 -15 
             C 75 0, 65 15, 50 15 Z" 
          fill="url(#cloudGrad)" />
  </g>
</svg>
