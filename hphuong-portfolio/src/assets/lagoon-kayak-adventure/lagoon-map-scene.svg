<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="mapTitle mapDesc">
  <title id="mapTitle">Lagoon Kayak Map Scene</title>
  <desc id="mapDesc">A beautiful illustrated map of a tropical lagoon with small islands, sandy shores, and a dotted route for a kayak adventure.</desc>
  <defs>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EFFAFF" />
      <stop offset="50%" stop-color="#D2F1FE" />
      <stop offset="100%" stop-color="#8AD9FF" />
    </linearGradient>
    <linearGradient id="islandGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5F0C6" />
      <stop offset="100%" stop-color="#54D597" />
    </linearGradient>
    <linearGradient id="islandGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEFA8" />
      <stop offset="100%" stop-color="#FCD26B" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#123E48" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Water Background -->
  <rect width="1000" height="600" rx="24" fill="url(#waterGrad)" />
  
  <!-- Wave Ripple Textures in Water -->
  <g fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6">
    <path d="M100 150 C 130 145, 170 145, 200 150 M120 160 C 140 157, 160 157, 180 160" />
    <path d="M400 80 C 430 75, 470 75, 500 80 M420 90 C 440 87, 460 87, 480 90" />
    <path d="M750 200 C 780 195, 820 195, 850 200 M770 210 C 790 207, 810 207, 830 210" />
    <path d="M250 450 C 280 445, 320 445, 350 450 M270 460 C 290 457, 310 457, 330 460" />
    <path d="M680 480 C 710 475, 750 475, 780 480 M700 490 C 720 487, 740 487, 760 490" />
  </g>

  <!-- Sandy Beds (Shallow Water Outer Islands) -->
  <path d="M 80 120 C 150 90, 260 110, 220 200 C 180 280, 100 240, 60 190 C 40 160, 50 130, 80 120 Z" fill="#FFF0C9" opacity="0.6" filter="url(#shadow)" />
  <path d="M 750 100 C 850 80, 920 130, 900 220 C 880 280, 780 300, 740 230 C 710 180, 700 110, 750 100 Z" fill="#FFF0C9" opacity="0.6" filter="url(#shadow)" />
  <path d="M 450 350 C 550 320, 650 380, 600 480 C 550 550, 420 520, 380 450 C 350 400, 390 370, 450 350 Z" fill="#FFF0C9" opacity="0.6" filter="url(#shadow)" />

  <!-- Tropical Islands (Green Land) -->
  <path d="M 100 130 C 140 110, 220 120, 190 180 C 160 230, 110 210, 80 170 C 60 145, 80 135, 100 130 Z" fill="url(#islandGrad1)" filter="url(#shadow)" />
  <path d="M 770 120 C 830 100, 880 140, 860 200 C 840 240, 780 250, 750 200 C 730 160, 740 130, 770 120 Z" fill="url(#islandGrad1)" filter="url(#shadow)" />
  <path d="M 470 380 C 530 350, 590 390, 560 450 C 530 490, 440 480, 410 430 C 390 390, 430 390, 470 380 Z" fill="url(#islandGrad1)" filter="url(#shadow)" />

  <!-- Route dashed line -->
  <path d="M 150 180 C 250 180, 320 120, 480 180 C 640 240, 700 150, 760 180 C 820 210, 800 350, 680 390 C 560 430, 560 430, 490 430" 
        fill="none" stroke="#FF7F9E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10, 12" />

  <!-- Route start marker -->
  <circle cx="150" cy="180" r="10" fill="#FF7F9E" />
  <circle cx="150" cy="180" r="4" fill="#FFFFFF" />

  <!-- Small compass decor -->
  <g transform="translate(850, 480)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="45" fill="#FFFFFF" stroke="#27C6C2" stroke-width="4" />
    <circle cx="0" cy="0" r="38" fill="none" stroke="#B9F3EE" stroke-width="1" stroke-dasharray="3, 3" />
    <path d="M-5 -5 L0 -30 L5 -5 L0 30 Z" fill="#FF7F9E" />
    <path d="M-5 5 L0 30 L5 5 L0 -30 Z" fill="#123E48" opacity="0.4" />
    <circle cx="0" cy="0" r="5" fill="#FFD86B" />
    <text x="-6" y="-33" font-family="'Quicksand', sans-serif" font-size="10" font-weight="bold" fill="#123E48">N</text>
    <text x="-5" y="42" font-family="'Quicksand', sans-serif" font-size="10" font-weight="bold" fill="#123E48">S</text>
  </g>
</svg>
