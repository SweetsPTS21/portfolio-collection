<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="bottleTitle bottleDesc">
  <title id="bottleTitle">Signal Message Bottle</title>
  <desc id="bottleDesc">A cute transparent glass bottle floating on sea waves, holding a message scroll inside with expanding waves.</desc>
  <defs>
    <filter id="bottleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#123E48" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Ripples on the water surface -->
  <g fill="none" stroke="#7CEAFF" stroke-linecap="round" opacity="0.8">
    <ellipse cx="100" cy="120" rx="70" ry="18" stroke-width="2" />
    <ellipse cx="100" cy="120" rx="45" ry="11" stroke-width="1.5" stroke-dasharray="4, 4" />
    <ellipse cx="100" cy="120" rx="25" ry="6" stroke-width="1" />
  </g>

  <!-- Splashes -->
  <path d="M 50 115 C 60 110, 70 110, 80 115 M 120 115 C 130 110, 140 110, 150 115" stroke="#27C6C2" stroke-width="2" fill="none" opacity="0.6" />

  <!-- The Bottle -->
  <g transform="translate(100, 105) rotate(15)" filter="url(#bottleShadow)">
    <!-- Scroll inside bottle -->
    <rect x="-10" y="-12" width="20" height="32" rx="3" fill="#FFF0C9" stroke="#E8C88D" stroke-width="1" />
    <line x1="-6" y1="-5" x2="6" y2="-5" stroke="#8C7660" stroke-width="1.5" stroke-linecap="round" />
    <line x1="-6" y1="2" x2="4" y2="2" stroke="#8C7660" stroke-width="1.5" stroke-linecap="round" />
    <line x1="-6" y1="9" x2="2" y2="9" stroke="#8C7660" stroke-width="1.5" stroke-linecap="round" />
    <circle cx="5" cy="11" r="2.5" fill="#FF7F9E" />

    <!-- Glass Bottle Body -->
    <path d="M -16 -20 C -16 -20, -16 -24, -8 -26 L -8 -38 L 8 -38 L 8 -26 C 16 -24, 16 -20, 16 -20 L 18 25 C 18 32, 10 36, 0 36 C -10 36, -18 32, -18 25 Z" 
          fill="#ECFFFB" fill-opacity="0.55" stroke="#27C6C2" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Reflection highlights on glass -->
    <path d="M -13 -10 C -13 5, -14 15, -12 25" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8" />
    
    <!-- Cork Stopper -->
    <polygon points="-7,-38 7,-38 5,-46 -5,-46" fill="#A08A75" stroke="#7A6855" stroke-width="1.5" />
    
    <!-- Red ribbon tied to cork -->
    <path d="M 0 -38 Q 12 -44, 8 -50 Q 2 -44, 0 -38" fill="#FF7F9E" />
  </g>
</svg>
