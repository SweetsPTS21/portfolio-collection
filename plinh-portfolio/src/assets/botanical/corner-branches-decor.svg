<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="100%" height="100%">
  <!-- Top Left corner branch design -->
  <path d="M0,0 Q60,20 120,40 Q80,70 0,90 Z" fill="none" />
  <!-- Main stem -->
  <path d="M0,0 Q40,15 110,35 Q130,40 145,38" fill="none" stroke="#3A5A40" stroke-width="2" stroke-linecap="round" />
  
  <!-- Leaf 1 (Large Leaf near corner) -->
  <path d="M25,9 C35,16 40,25 35,32 C28,30 20,22 25,9 Z" fill="#588157" fill-opacity="0.85" stroke="#3A5A40" stroke-width="1" />
  <line x1="25" y1="9" x2="31" y2="24" stroke="#3A5A40" stroke-width="0.8" />

  <!-- Leaf 2 (Narrower Leaf) -->
  <path d="M55,20 C68,26 70,36 62,40 C55,36 50,28 55,20 Z" fill="#A3B18A" fill-opacity="0.9" stroke="#588157" stroke-width="1" />
  
  <!-- Leaf 3 (Small hanging leaf) -->
  <path d="M82,27 C92,30 96,38 90,41 C85,38 80,32 82,27 Z" fill="#588157" fill-opacity="0.75" stroke="#3A5A40" stroke-width="0.8" />
  
  <!-- Leaf 4 (Leaf pointing downwards) -->
  <path d="M110,35 C118,34 125,39 122,43 C116,42 110,39 110,35 Z" fill="#DAD7CD" stroke="#A3B18A" stroke-width="0.8" />

  <!-- Branch side twig 1 -->
  <path d="M35,14 Q65,45 60,65" fill="none" stroke="#3A5A40" stroke-width="1.2" />
  <path d="M50,38 C56,48 52,55 46,50 C44,42 46,38 50,38 Z" fill="#A3B18A" fill-opacity="0.85" stroke="#588157" stroke-width="0.8" />
  <path d="M60,52 C68,58 64,66 58,62 C54,55 56,50 60,52 Z" fill="#588157" fill-opacity="0.9" stroke="#3A5A40" stroke-width="0.8" />
</svg>
