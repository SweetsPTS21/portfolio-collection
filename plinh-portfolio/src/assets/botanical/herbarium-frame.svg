<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350" width="100%" height="100%">
  <defs>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#3A5A40" flood-opacity="0.1" />
    </filter>
  </defs>
  <!-- Background glass panel -->
  <rect x="10" y="10" width="280" height="330" rx="20" fill="#DAD7CD" fill-opacity="0.25" stroke="#A3B18A" stroke-width="1.5" filter="url(#soft-shadow)" />
  <!-- Inner thin gold/brass border -->
  <rect x="18" y="18" width="264" height="314" rx="14" fill="none" stroke="#D6A25F" stroke-width="1" stroke-opacity="0.6" />
  <!-- Dried leaves inside glass corner (bottom-left) -->
  <g transform="translate(15, 290) rotate(-15) scale(0.6)">
    <path d="M20,50 Q40,10 50,0 Q60,30 30,60 Z" fill="#588157" fill-opacity="0.4" stroke="#3A5A40" stroke-width="1" />
    <path d="M5,60 Q30,40 40,25 Q45,35 25,65 Z" fill="#A3B18A" fill-opacity="0.4" stroke="#588157" stroke-width="0.8" />
  </g>
  <!-- Dried leaves inside glass corner (top-right) -->
  <g transform="translate(250, 15) rotate(165) scale(0.55)">
    <path d="M20,50 Q40,10 50,0 Q60,30 30,60 Z" fill="#588157" fill-opacity="0.4" stroke="#3A5A40" stroke-width="1" />
  </g>
</svg>
