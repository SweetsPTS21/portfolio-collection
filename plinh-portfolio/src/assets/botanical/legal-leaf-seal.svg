<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="seal-emboss" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Wax stamp outer uneven circle -->
  <path d="M50,8 C72,7 88,18 90,44 C92,70 78,88 54,92 C30,96 10,80 8,56 C6,32 28,9 50,8 Z" fill="#D6A25F" stroke="#B08040" stroke-width="1" filter="url(#seal-emboss)" />
  <!-- Inner circular ridge -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="1 1" />
  <!-- Scales of Justice (Cán cân công lý) -->
  <g stroke="#3A5A40" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(1,0)">
    <!-- Stand -->
    <line x1="50" y1="32" x2="50" y2="68" />
    <line x1="42" y1="68" x2="58" y2="68" />
    <!-- Beam -->
    <line x1="36" y1="38" x2="64" y2="38" />
    <!-- Left Scale -->
    <line x1="36" y1="38" x2="32" y2="52" />
    <line x1="36" y1="38" x2="40" y2="52" />
    <path d="M29,52 L43,52 C43,58 29,58 29,52 Z" fill="#3A5A40" fill-opacity="0.3" stroke-width="1" />
    <!-- Right Scale -->
    <line x1="64" y1="38" x2="60" y2="52" />
    <line x1="64" y1="38" x2="68" y2="52" />
    <path d="M57,52 L71,52 C71,58 57,58 57,52 Z" fill="#3A5A40" fill-opacity="0.3" stroke-width="1" />
  </g>
  <!-- Laurel / Leaf wreath at bottom -->
  <path d="M24,65 Q28,75 50,75 Q72,75 76,65" fill="none" stroke="#3A5A40" stroke-width="1.2" />
  <!-- Sprout leaves -->
  <circle cx="24" cy="65" r="2" fill="#3A5A40" />
  <circle cx="76" cy="65" r="2" fill="#3A5A40" />
  <path d="M34,73 C35,70 38,71 37,74 Z" fill="#3A5A40" />
  <path d="M66,73 C65,70 62,71 63,74 Z" fill="#3A5A40" />
</svg>
