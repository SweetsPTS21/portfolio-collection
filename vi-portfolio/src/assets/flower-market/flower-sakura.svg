<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70" fill="none">
  <!-- Cherry blossom — 5 heart-shaped petals -->
  <!-- Petal 1 top -->
  <path d="M30,8 C26,4 20,6 20,12 C20,18 26,22 30,28 C34,22 40,18 40,12 C40,6 34,4 30,8Z" fill="#FFB8C8" opacity="0.85"/>
  <!-- Petal 2 right -->
  <path d="M30,8 C26,4 20,6 20,12 C20,18 26,22 30,28 C34,22 40,18 40,12 C40,6 34,4 30,8Z" fill="#F4A0B8" opacity="0.85" transform="rotate(72 30 25)"/>
  <!-- Petal 3 -->
  <path d="M30,8 C26,4 20,6 20,12 C20,18 26,22 30,28 C34,22 40,18 40,12 C40,6 34,4 30,8Z" fill="#FFB8C8" opacity="0.85" transform="rotate(144 30 25)"/>
  <!-- Petal 4 -->
  <path d="M30,8 C26,4 20,6 20,12 C20,18 26,22 30,28 C34,22 40,18 40,12 C40,6 34,4 30,8Z" fill="#F4A0B8" opacity="0.85" transform="rotate(216 30 25)"/>
  <!-- Petal 5 -->
  <path d="M30,8 C26,4 20,6 20,12 C20,18 26,22 30,28 C34,22 40,18 40,12 C40,6 34,4 30,8Z" fill="#FFB8C8" opacity="0.85" transform="rotate(288 30 25)"/>
  <!-- Center -->
  <circle cx="30" cy="25" r="7" fill="#FFE0E8"/>
  <circle cx="30" cy="25" r="4" fill="#FF9AB0"/>
  <!-- Stamens -->
  <line x1="30" y1="18" x2="30" y2="14" stroke="#FF6888" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="30" cy="13" r="1.2" fill="#FF6888"/>
  <line x1="34" y1="20" x2="37" y2="17" stroke="#FF6888" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="38" cy="16" r="1.2" fill="#FF6888"/>
  <line x1="26" y1="20" x2="23" y2="17" stroke="#FF6888" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="22" cy="16" r="1.2" fill="#FF6888"/>
  <!-- Branch -->
  <path d="M30,32 C28,42 26,52 24,62" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M30,32 C32,40 36,46 40,52" stroke="#8B5E3C" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Small buds on branch -->
  <ellipse cx="36" cy="50" rx="4" ry="3" fill="#FFD0DC" transform="rotate(-20 36 50)"/>
  <ellipse cx="25" cy="55" rx="3.5" ry="2.5" fill="#FFB8C8" transform="rotate(10 25 55)"/>
</svg>
