<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" fill="none">
  <!-- Branch illustration with multiple flower types -->

  <!-- Main branch -->
  <path d="M0,50 C80,45 160,55 240,48 C320,41 400,52 480,46 C540,42 570,44 600,46"
    stroke="#8B5E3C" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Sub branches -->
  <path d="M100,49 C100,40 104,28 108,22" stroke="#8B5E3C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M200,48 C198,38 195,26 192,18" stroke="#8B5E3C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M300,46 C302,36 306,24 310,16" stroke="#8B5E3C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M400,47 C398,37 394,26 390,18" stroke="#8B5E3C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M500,46 C502,37 505,25 508,18" stroke="#8B5E3C" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Leaves along branch -->
  <path d="M60,50 C55,42 46,44 48,52 C50,60 59,56 60,50Z" fill="#8FAF8A" opacity="0.8"/>
  <path d="M150,50 C155,42 164,44 162,52 C160,60 151,56 150,50Z" fill="#7A9E76" opacity="0.8"/>
  <path d="M250,48 C245,40 236,42 238,50 C240,58 249,54 250,48Z" fill="#8FAF8A" opacity="0.8"/>
  <path d="M350,47 C355,39 364,41 362,49 C360,57 351,53 350,47Z" fill="#7A9E76" opacity="0.8"/>
  <path d="M450,47 C445,39 436,41 438,49 C440,57 449,53 450,47Z" fill="#8FAF8A" opacity="0.8"/>
  <path d="M550,46 C555,38 564,40 562,48 C560,56 551,52 550,46Z" fill="#7A9E76" opacity="0.8"/>

  <!-- Rose at branch 1 (100) -->
  <g transform="translate(108,15)">
    <path d="M0,-10 C6,-7 9,-1 7,5 C5,10 1,12 0,10 C-1,12 -5,10 -7,5 C-9,-1 -6,-7 0,-10Z" fill="#C9797A" opacity="0.7"/>
    <path d="M10,-3 C10,6 4,11 0,10 C-4,11 -10,6 -10,-3 C-10,-8 -4,-10 0,-10 C4,-10 10,-8 10,-3Z" fill="#E89090" opacity="0.4"/>
    <path d="M0,-6 C4,-4 6,-1 5,3 C4,6 1,8 0,7 C-1,8 -4,6 -5,3 C-6,-1 -4,-4 0,-6Z" fill="#B86868"/>
    <circle cx="0" cy="2" r="3" fill="#9A5050"/>
  </g>

  <!-- Daisy at branch 2 (200) -->
  <g transform="translate(192,12)">
    <ellipse cx="0" cy="-9" rx="3.5" ry="6.5" fill="#FDF6F0"/>
    <ellipse cx="0" cy="-9" rx="3.5" ry="6.5" fill="#FDF6F0" transform="rotate(45)"/>
    <ellipse cx="0" cy="-9" rx="3.5" ry="6.5" fill="#FDF6F0" transform="rotate(90)"/>
    <ellipse cx="0" cy="-9" rx="3.5" ry="6.5" fill="#FDF6F0" transform="rotate(135)"/>
    <circle cx="0" cy="0" r="5.5" fill="#F5E040"/>
    <circle cx="0" cy="0" r="3" fill="#E0C020"/>
  </g>

  <!-- Lavender at branch 3 (300) -->
  <g transform="translate(310,6)">
    <ellipse cx="0" cy="-8" rx="2.5" ry="4" fill="#C4A8D8"/>
    <ellipse cx="-3" cy="-5" rx="2" ry="3.5" fill="#B890C8"/>
    <ellipse cx="3" cy="-5" rx="2" ry="3.5" fill="#C4A8D8"/>
    <ellipse cx="0" cy="-2" rx="2" ry="3" fill="#B890C8"/>
    <ellipse cx="-2" cy="1" rx="2" ry="3" fill="#D0B8E0"/>
    <ellipse cx="2" cy="2" rx="2" ry="3" fill="#C4A8D8"/>
  </g>

  <!-- Sakura at branch 4 (400) -->
  <g transform="translate(390,12)">
    <path d="M0,-10 C-3,-5 -8,-3 -8,2 C-8,7 -3,9 0,8 C3,9 8,7 8,2 C8,-3 3,-5 0,-10Z" fill="#FFB8C8" opacity="0.8"/>
    <path d="M0,-10 C-3,-5 -8,-3 -8,2 C-8,7 -3,9 0,8 C3,9 8,7 8,2 C8,-3 3,-5 0,-10Z" fill="#F4A0B8" opacity="0.8" transform="rotate(72 0 2)"/>
    <path d="M0,-10 C-3,-5 -8,-3 -8,2 C-8,7 -3,9 0,8 C3,9 8,7 8,2 C8,-3 3,-5 0,-10Z" fill="#FFB8C8" opacity="0.8" transform="rotate(144 0 2)"/>
    <path d="M0,-10 C-3,-5 -8,-3 -8,2 C-8,7 -3,9 0,8 C3,9 8,7 8,2 C8,-3 3,-5 0,-10Z" fill="#F4A0B8" opacity="0.8" transform="rotate(216 0 2)"/>
    <path d="M0,-10 C-3,-5 -8,-3 -8,2 C-8,7 -3,9 0,8 C3,9 8,7 8,2 C8,-3 3,-5 0,-10Z" fill="#FFB8C8" opacity="0.8" transform="rotate(288 0 2)"/>
    <circle cx="0" cy="2" r="4" fill="#FFE0E8"/>
    <circle cx="0" cy="2" r="2.2" fill="#FF9AB0"/>
  </g>

  <!-- Tulip at branch 5 (500) -->
  <g transform="translate(508,14)">
    <path d="M0,-12 C-5,-9 -7,-3 -6,3 C-5,8 -2,10 0,9 C2,10 5,8 6,3 C7,-3 5,-9 0,-12Z" fill="#F5C5A3"/>
    <path d="M-7,-5 C-10,-2 -10,3 -7,7 C-5,4 -4,1 -6,-3Z" fill="#D98060" opacity="0.7"/>
    <path d="M7,-5 C10,-2 10,3 7,7 C5,4 4,1 6,-3Z" fill="#D98060" opacity="0.7"/>
  </g>

  <!-- Falling petals decoration -->
  <ellipse cx="80" cy="65" rx="5" ry="3" fill="#FFB8C8" opacity="0.4" transform="rotate(-20 80 65)"/>
  <ellipse cx="180" cy="70" rx="4" ry="2.5" fill="#C9797A" opacity="0.3" transform="rotate(15 180 70)"/>
  <ellipse cx="330" cy="68" rx="4.5" ry="3" fill="#F5C5A3" opacity="0.35" transform="rotate(-10 330 68)"/>
  <ellipse cx="460" cy="66" rx="5" ry="3" fill="#FFB8C8" opacity="0.4" transform="rotate(25 460 66)"/>
</svg>
