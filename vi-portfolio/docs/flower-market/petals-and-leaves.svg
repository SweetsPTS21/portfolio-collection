<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" id="petals-sheet">
  <!-- Rose petal -->
  <g id="petal-rose">
    <path d="M20,0 C28,4 32,14 28,24 C24,34 14,38 8,34 C2,30 2,18 8,10 C12,4 16,0 20,0Z"
      fill="#C9797A" opacity="0.75"/>
  </g>

  <!-- Sakura petal -->
  <g id="petal-sakura" transform="translate(80,0)">
    <path d="M10,0 C18,2 22,10 20,20 C18,28 12,32 6,28 C0,24 0,14 4,6 C6,2 8,0 10,0Z"
      fill="#FFB8C8" opacity="0.8"/>
    <path d="M10,14 C10,8 10,4 10,0" stroke="#FF9AB0" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Tulip petal -->
  <g id="petal-tulip" transform="translate(140,0)">
    <path d="M12,0 C20,6 22,18 18,28 C14,36 6,38 2,32 C-2,26 0,14 6,6 C8,2 10,0 12,0Z"
      fill="#F5A0C0" opacity="0.75"/>
  </g>

  <!-- Daisy petal -->
  <g id="petal-daisy" transform="translate(200,0)">
    <ellipse cx="8" cy="14" rx="7" ry="13" fill="#FDF6F0" opacity="0.85" stroke="#EDCFC0" stroke-width="0.5"/>
  </g>

  <!-- Magnolia petal -->
  <g id="petal-magnolia" transform="translate(240,0)">
    <path d="M14,0 C22,8 24,20 20,30 C16,38 8,40 4,34 C0,28 2,16 8,8 C10,4 12,0 14,0Z"
      fill="#F5EDE8" opacity="0.8"/>
  </g>

  <!-- Peony petal -->
  <g id="petal-peony" transform="translate(300,0)">
    <path d="M14,0 C22,4 26,14 22,24 C18,34 8,38 2,32 C-4,26 -2,14 6,6 C8,2 12,0 14,0Z"
      fill="#F4A0A0" opacity="0.72"/>
    <path d="M14,0 C14,10 12,20 10,32" stroke="#E88080" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Poppy petal -->
  <g id="petal-poppy" transform="translate(350,0)">
    <path d="M16,0 C24,6 26,18 20,28 C16,36 8,36 4,28 C0,20 4,8 10,2 C12,0 14,0 16,0Z"
      fill="#E84040" opacity="0.7"/>
  </g>

  <!-- Small leaves -->
  <g id="leaf-small" transform="translate(0,60)">
    <path d="M10,0 C18,-4 24,2 22,12 C20,20 12,22 6,16 C2,10 2,4 10,0Z"
      fill="#8FAF8A" opacity="0.7"/>
    <path d="M10,0 C12,8 14,16 14,22" stroke="#5A7A58" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Hydrangea petal -->
  <g id="petal-hydrangea" transform="translate(60,60)">
    <path d="M8,0 C14,2 16,10 14,18 C12,24 6,26 2,22 C-2,18 0,10 4,4 C6,2 8,0 8,0Z"
      fill="#B8D8F5" opacity="0.8"/>
  </g>

  <!-- Wisteria floret -->
  <g id="petal-wisteria" transform="translate(110,60)">
    <ellipse cx="8" cy="12" rx="7" ry="11" fill="#C4A8D8" opacity="0.78"/>
  </g>

  <!-- Carnation frill petal -->
  <g id="petal-carnation" transform="translate(155,60)">
    <path d="M12,0 C18,4 20,12 18,20 C16,26 10,28 6,24 C2,20 4,12 8,6 C10,2 12,0 12,0Z"
      fill="#FF8FA0" opacity="0.75"/>
    <path d="M12,0 C10,6 8,12 8,20" stroke="#E870888" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Lotus petal -->
  <g id="petal-lotus" transform="translate(210,55)">
    <path d="M12,0 C20,6 22,18 18,30 C14,40 6,42 2,34 C-2,26 2,12 8,4 C10,2 12,0 12,0Z"
      fill="#FFB8C8" opacity="0.8"/>
    <path d="M12,0 C12,12 10,24 8,34" stroke="#FF9AB0" stroke-width="0.5" opacity="0.4"/>
  </g>
</svg>
