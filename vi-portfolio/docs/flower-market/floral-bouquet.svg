<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none">
  <defs>
    <radialGradient id="rose1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F4A0A0"/>
      <stop offset="100%" stop-color="#C9797A"/>
    </radialGradient>
    <radialGradient id="rose2" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F5C5A3"/>
      <stop offset="100%" stop-color="#D98060"/>
    </radialGradient>
    <radialGradient id="rose3" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#E8D5F0"/>
      <stop offset="100%" stop-color="#B89EC0"/>
    </radialGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A9E76"/>
      <stop offset="100%" stop-color="#4A6B48"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDCFC0"/>
      <stop offset="100%" stop-color="#C9797A"/>
    </linearGradient>
  </defs>

  <!-- Stems -->
  <path d="M160 380 C158 340 155 310 150 280" stroke="url(#stem)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M160 380 C162 338 168 308 175 275" stroke="url(#stem)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M160 380 C160 342 160 312 160 280" stroke="url(#stem)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M160 380 C155 345 142 315 130 290" stroke="url(#stem)" stroke-width="2" stroke-linecap="round"/>
  <path d="M160 380 C165 345 178 318 190 295" stroke="url(#stem)" stroke-width="2" stroke-linecap="round"/>

  <!-- Leaves -->
  <path d="M148 320 C138 305 125 310 128 325 C131 340 145 335 148 320Z" fill="#8FAF8A" opacity="0.85"/>
  <path d="M172 315 C182 300 198 306 194 321 C190 336 175 330 172 315Z" fill="#7A9E76" opacity="0.85"/>
  <path d="M133 295 C120 282 110 290 115 304 C120 318 132 308 133 295Z" fill="#8FAF8A" opacity="0.7"/>
  <path d="M188 300 C200 287 212 294 207 308 C202 322 190 312 188 300Z" fill="#7A9E76" opacity="0.7"/>

  <!-- Daisy - small white flower left -->
  <g transform="translate(125,258)">
    <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#FDF6F0" opacity="0.9"/>
    <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#FDF6F0" opacity="0.9" transform="rotate(45)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#FDF6F0" opacity="0.9" transform="rotate(90)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#FDF6F0" opacity="0.9" transform="rotate(135)"/>
    <circle cx="0" cy="0" r="8" fill="#F5E6C8"/>
    <circle cx="0" cy="0" r="5" fill="#E8C99A"/>
  </g>

  <!-- Rose 1 — center large dusty rose -->
  <g transform="translate(160,220)">
    <ellipse cx="0" cy="0" rx="32" ry="28" fill="url(#rose1)" opacity="0.15"/>
    <!-- outer petals -->
    <path d="M0,-28 C12,-22 22,-8 20,8 C18,24 4,30 0,28 C-4,30 -18,24 -20,8 C-22,-8 -12,-22 0,-28Z" fill="#F4A0A0" opacity="0.7"/>
    <path d="M28,-8 C28,12 14,24 0,24 C-14,24 -28,12 -28,-8 C-28,-20 -14,-28 0,-28 C14,-28 28,-20 28,-8Z" fill="#E89090" opacity="0.5"/>
    <!-- inner petals -->
    <path d="M0,-20 C10,-14 16,-4 14,8 C12,18 4,22 0,20 C-4,22 -12,18 -14,8 C-16,-4 -10,-14 0,-20Z" fill="#C9797A"/>
    <path d="M18,-4 C18,10 8,18 0,18 C-8,18 -18,10 -18,-4 C-18,-14 -8,-20 0,-20 C8,-20 18,-14 18,-4Z" fill="#B86868" opacity="0.6"/>
    <!-- center -->
    <path d="M0,-12 C8,-8 12,0 10,8 C8,14 2,16 0,14 C-2,16 -8,14 -10,8 C-12,0 -8,-8 0,-12Z" fill="#C9797A"/>
    <ellipse cx="0" cy="2" rx="8" ry="6" fill="#A85C5C"/>
    <ellipse cx="0" cy="2" rx="4" ry="3" fill="#8B4545"/>
  </g>

  <!-- Rose 2 — right peach -->
  <g transform="translate(192,248)">
    <path d="M0,-22 C9,-17 17,-6 15,7 C13,19 3,23 0,22 C-3,23 -13,19 -15,7 C-17,-6 -9,-17 0,-22Z" fill="#F5C5A3" opacity="0.75"/>
    <path d="M22,-6 C22,10 10,18 0,18 C-10,18 -22,10 -22,-6 C-22,-16 -10,-22 0,-22 C10,-22 22,-16 22,-6Z" fill="#E8A882" opacity="0.5"/>
    <path d="M0,-14 C7,-9 11,-2 9,7 C7,14 2,17 0,15 C-2,17 -7,14 -9,7 C-11,-2 -7,-9 0,-14Z" fill="#D98060"/>
    <ellipse cx="0" cy="2" rx="6" ry="5" fill="#C06845"/>
  </g>

  <!-- Rose 3 — left lavender -->
  <g transform="translate(128,252)">
    <path d="M0,-20 C8,-15 14,-5 12,7 C10,17 2,20 0,18 C-2,20 -10,17 -12,7 C-14,-5 -8,-15 0,-20Z" fill="#E8D5F0" opacity="0.75"/>
    <path d="M20,-5 C20,9 9,17 0,17 C-9,17 -20,9 -20,-5 C-20,-14 -9,-20 0,-20 C9,-20 20,-14 20,-5Z" fill="#D0B8E0" opacity="0.5"/>
    <path d="M0,-12 C7,-8 10,-2 8,6 C6,12 2,15 0,13 C-2,15 -6,12 -8,6 C-10,-2 -7,-8 0,-12Z" fill="#B89EC0"/>
    <ellipse cx="0" cy="2" rx="6" ry="4" fill="#9A80AA"/>
  </g>

  <!-- Small buds -->
  <g transform="translate(145,210)">
    <path d="M0,-12 C4,-8 6,-2 4,4 C2,8 0,9 0,8 C0,9 -2,8 -4,4 C-6,-2 -4,-8 0,-12Z" fill="#F4A0A0"/>
    <path d="M0,-14 C-3,-12 -5,-8 -4,-4" stroke="#7A9E76" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(175,215)">
    <path d="M0,-10 C3,-6 5,-2 3,4 C2,7 0,8 0,7 C0,8 -2,7 -3,4 C-5,-2 -3,-6 0,-10Z" fill="#F5C5A3"/>
    <path d="M0,-12 C3,-10 5,-6 4,-2" stroke="#7A9E76" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Ribbon -->
  <path d="M140,360 C145,355 155,358 160,360 C165,362 170,365 175,360 C180,355 172,348 160,352 C148,348 140,355 140,360Z" fill="url(#ribbon)" opacity="0.8"/>
  <path d="M142,362 C148,370 155,375 160,373 C165,375 172,370 178,362" stroke="#C9797A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- ribbon tails -->
  <path d="M140,360 C132,368 128,378 134,384" stroke="#D4A0A0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M178,362 C186,370 190,380 184,386" stroke="#D4A0A0" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Sparkle dots -->
  <circle cx="105" cy="200" r="2.5" fill="#F4A0A0" opacity="0.6"/>
  <circle cx="215" cy="210" r="2" fill="#E8C99A" opacity="0.6"/>
  <circle cx="95" cy="250" r="1.5" fill="#8FAF8A" opacity="0.5"/>
  <circle cx="225" cy="255" r="2" fill="#C9797A" opacity="0.4"/>
</svg>
