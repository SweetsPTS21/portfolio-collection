<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <pattern id="floralRepeat" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <!-- Mini rose -->
      <g transform="translate(12,12)">
        <path d="M0,-6 C3,-4 5,-1 4,3 C3,6 1,7 0,6 C-1,7 -3,6 -4,3 C-5,-1 -3,-4 0,-6Z" fill="#C9797A" opacity="0.12"/>
        <circle cx="0" cy="1" r="2.5" fill="#A85C5C" opacity="0.08"/>
      </g>
      <!-- Mini daisy -->
      <g transform="translate(38,12)">
        <ellipse cx="0" cy="-5" rx="2" ry="3.5" fill="#EDCFC0" opacity="0.15"/>
        <ellipse cx="0" cy="-5" rx="2" ry="3.5" fill="#EDCFC0" opacity="0.15" transform="rotate(60)"/>
        <ellipse cx="0" cy="-5" rx="2" ry="3.5" fill="#EDCFC0" opacity="0.15" transform="rotate(120)"/>
        <circle cx="0" cy="0" r="2.5" fill="#E8C99A" opacity="0.12"/>
      </g>
      <!-- Mini tulip -->
      <g transform="translate(12,38)">
        <path d="M0,-7 C-3,-5 -4,-1 -3,3 C-2,6 0,7 0,6 C0,7 2,6 3,3 C4,-1 3,-5 0,-7Z" fill="#F5C5A3" opacity="0.14"/>
      </g>
      <!-- Mini sakura -->
      <g transform="translate(38,38)">
        <path d="M0,-6 C-2,-3 -5,-2 -5,1 C-5,4 -2,5 0,4 C2,5 5,4 5,1 C5,-2 2,-3 0,-6Z" fill="#FFB8C8" opacity="0.14"/>
        <path d="M0,-6 C-2,-3 -5,-2 -5,1 C-5,4 -2,5 0,4 C2,5 5,4 5,1 C5,-2 2,-3 0,-6Z" fill="#FFB8C8" opacity="0.1" transform="rotate(72 0 1)"/>
        <path d="M0,-6 C-2,-3 -5,-2 -5,1 C-5,4 -2,5 0,4 C2,5 5,4 5,1 C5,-2 2,-3 0,-6Z" fill="#FFB8C8" opacity="0.1" transform="rotate(144 0 1)"/>
        <path d="M0,-6 C-2,-3 -5,-2 -5,1 C-5,4 -2,5 0,4 C2,5 5,4 5,1 C5,-2 2,-3 0,-6Z" fill="#FFB8C8" opacity="0.1" transform="rotate(216 0 1)"/>
        <path d="M0,-6 C-2,-3 -5,-2 -5,1 C-5,4 -2,5 0,4 C2,5 5,4 5,1 C5,-2 2,-3 0,-6Z" fill="#FFB8C8" opacity="0.1" transform="rotate(288 0 1)"/>
      </g>
      <!-- Mini leaf dot -->
      <path d="M25,22 C23,18 19,19 20,23 C21,27 24,26 25,22Z" fill="#8FAF8A" opacity="0.1"/>
      <path d="M25,28 C27,24 31,25 30,29 C29,33 26,32 25,28Z" fill="#7A9E76" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#floralRepeat)"/>
</svg>
