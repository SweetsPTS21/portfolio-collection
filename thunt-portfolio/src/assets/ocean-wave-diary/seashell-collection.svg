<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shell 1: Pink spiral conch -->
  <g transform="translate(40,50)">
    <ellipse cx="0" cy="0" rx="30" ry="22" fill="#FFB7C8" stroke="#FFD7E2" stroke-width="2"/>
    <path d="M-20,0 Q-5,-14 15,0 Q5,12 -5,8 Q-15,4 -20,0" fill="#FFD7E2" opacity="0.7"/>
    <path d="M-10,-4 Q5,-10 18,0" fill="none" stroke="#FBFEFF" stroke-width="1.5" opacity="0.6"/>
    <circle cx="10" cy="-4" r="5" fill="#FBFEFF" opacity="0.5"/>
    <ellipse cx="-5" cy="6" rx="8" ry="4" fill="#FFB7C8" opacity="0.6"/>
    <!-- Point -->
    <path d="M-22,5 Q-28,0 -22,-5" fill="#FFD7E2" stroke="#FFB7C8" stroke-width="1"/>
  </g>

  <!-- Shell 2: Teal scallop -->
  <g transform="translate(140,50)">
    <path d="M0,-28 Q20,-14 28,0 Q20,14 0,22 Q-20,14 -28,0 Q-20,-14 0,-28 Z"
          fill="#7DDEC3" stroke="#A7E4FF" stroke-width="2"/>
    <line x1="0" y1="-26" x2="0" y2="20" stroke="#A7E4FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="-24" y1="-10" x2="24" y2="10" stroke="#A7E4FF" stroke-width="1" opacity="0.4"/>
    <line x1="24" y1="-10" x2="-24" y2="10" stroke="#A7E4FF" stroke-width="1" opacity="0.4"/>
    <line x1="-14" y1="-22" x2="14" y2="18" stroke="#A7E4FF" stroke-width="1" opacity="0.3"/>
    <line x1="14" y1="-22" x2="-14" y2="18" stroke="#A7E4FF" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="6" fill="#FBFEFF" opacity="0.6"/>
  </g>

  <!-- Shell 3: Gold round nautilus -->
  <g transform="translate(100,140)">
    <circle cx="0" cy="0" r="26" fill="#FFD978" stroke="#FFEBC7" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#FFEBC7" stroke="#FFD978" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="10" fill="#FFD978" stroke="#FFEBC7" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#FBFEFF"/>
    <!-- Spiral lines -->
    <path d="M0,-24 Q12,-12 0,0" fill="none" stroke="#FFB7C8" stroke-width="1.5" opacity="0.6"/>
    <path d="M0,0 Q14,10 0,24" fill="none" stroke="#FFB7C8" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Sparkle accents -->
  <g fill="#FFD978" opacity="0.8">
    <polygon points="180,90 182,96 188,96 183,100 185,106 180,102 175,106 177,100 172,96 178,96" transform="scale(0.5) translate(180,100)"/>
  </g>
</svg>
