<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB7C8"/>
      <stop offset="100%" stop-color="#FF8AAA"/>
    </linearGradient>
    <linearGradient id="starCenter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD7E2"/>
      <stop offset="100%" stop-color="#FFB7C8"/>
    </linearGradient>
  </defs>

  <!-- Star body (5 arms) — cute rounded -->
  <!-- Arm 1 (top) -->
  <path d="M50,12 Q56,28 60,34 Q54,32 50,30 Q46,32 40,34 Q44,28 50,12 Z"
        fill="url(#starGrad)" stroke="#FF8AAA" stroke-width="1.5"/>
  <!-- Arm 2 (top-right) -->
  <path d="M50,30 Q66,32 76,28 Q68,36 66,42 Q60,40 56,38 Q56,34 50,30 Z"
        fill="url(#starGrad)" stroke="#FF8AAA" stroke-width="1.5"/>
  <!-- Arm 3 (bottom-right) -->
  <path d="M56,38 Q70,52 70,64 Q62,58 58,56 Q56,50 52,46 Q54,42 56,38 Z"
        fill="url(#starGrad)" stroke="#FF8AAA" stroke-width="1.5"/>
  <!-- Arm 4 (bottom-left) -->
  <path d="M44,46 Q46,50 48,56 Q44,58 36,64 Q36,52 50,38 Q48,42 44,46 Z"
        fill="url(#starGrad)" stroke="#FF8AAA" stroke-width="1.5"/>
  <!-- Arm 5 (top-left) -->
  <path d="M40,34 Q44,40 44,46 Q38,40 24,28 Q34,32 40,34 Z"
        fill="url(#starGrad)" stroke="#FF8AAA" stroke-width="1.5"/>

  <!-- Center circle -->
  <circle cx="50" cy="42" r="14" fill="url(#starCenter)" stroke="#FFB7C8" stroke-width="2"/>

  <!-- Texture dots on arms -->
  <g fill="#FFD7E2" opacity="0.7">
    <circle cx="50" cy="20" r="2"/>
    <circle cx="70" cy="32" r="2"/>
    <circle cx="64" cy="56" r="2"/>
    <circle cx="36" cy="56" r="2"/>
    <circle cx="30" cy="32" r="2"/>
    <circle cx="54" cy="25" r="1.5"/>
    <circle cx="67" cy="40" r="1.5"/>
    <circle cx="58" cy="62" r="1.5"/>
    <circle cx="42" cy="62" r="1.5"/>
    <circle cx="33" cy="40" r="1.5"/>
  </g>

  <!-- Cute face in center -->
  <!-- Eyes -->
  <circle cx="45" cy="40" r="3.5" fill="#18384A"/>
  <circle cx="55" cy="40" r="3.5" fill="#18384A"/>
  <circle cx="46.2" cy="38.8" r="1.5" fill="#FBFEFF"/>
  <circle cx="56.2" cy="38.8" r="1.5" fill="#FBFEFF"/>

  <!-- Happy smile -->
  <path d="M44,46 Q50,52 56,46" fill="none" stroke="#C04060" stroke-width="2" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="40" cy="46" rx="5" ry="3.5" fill="#FFB7C8" opacity="0.55"/>
  <ellipse cx="60" cy="46" rx="5" ry="3.5" fill="#FFB7C8" opacity="0.55"/>

  <!-- Tiny sparkle -->
  <g fill="#FFD978" opacity="0.9">
    <polygon points="82,18 83.5,22 87.5,22 84.5,24.5 85.5,28.5 82,26 78.5,28.5 79.5,24.5 76.5,22 80.5,22" transform="scale(0.6) translate(56,4)"/>
  </g>
</svg>
