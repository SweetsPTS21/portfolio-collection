<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <filter id="paperTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBFEFF"/>
      <stop offset="60%" stop-color="#EEF9FF"/>
      <stop offset="100%" stop-color="#C8EEFF" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#BFEAF8"/>
      <stop offset="100%" stop-color="#A7E4FF"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <rect x="12" y="12" width="376" height="496" rx="8" fill="#18384A" opacity="0.08"/>

  <!-- Page background -->
  <rect x="4" y="4" width="376" height="496" rx="8" fill="url(#pageGrad)" stroke="#BFEAF8" stroke-width="1.5"/>

  <!-- Spine binding line -->
  <rect x="4" y="4" width="16" height="496" rx="4" fill="url(#spineGrad)" opacity="0.5"/>

  <!-- Ruled lines -->
  <g stroke="#BFEAF8" stroke-width="1" opacity="0.6">
    <line x1="30" y1="80" x2="370" y2="80"/>
    <line x1="30" y1="108" x2="370" y2="108"/>
    <line x1="30" y1="136" x2="370" y2="136"/>
    <line x1="30" y1="164" x2="370" y2="164"/>
    <line x1="30" y1="192" x2="370" y2="192"/>
    <line x1="30" y1="220" x2="370" y2="220"/>
    <line x1="30" y1="248" x2="370" y2="248"/>
    <line x1="30" y1="276" x2="370" y2="276"/>
    <line x1="30" y1="304" x2="370" y2="304"/>
    <line x1="30" y1="332" x2="370" y2="332"/>
    <line x1="30" y1="360" x2="370" y2="360"/>
    <line x1="30" y1="388" x2="370" y2="388"/>
    <line x1="30" y1="416" x2="370" y2="416"/>
    <line x1="30" y1="444" x2="370" y2="444"/>
    <line x1="30" y1="472" x2="370" y2="472"/>
  </g>

  <!-- Margin line (red-ish) -->
  <line x1="55" y1="4" x2="55" y2="500" stroke="#FFB7C8" stroke-width="1" opacity="0.4"/>

  <!-- Corner fold (top-right) -->
  <path d="M350,4 L380,4 L380,34 Z" fill="#BFEAF8" opacity="0.7"/>
  <path d="M350,4 L380,34" fill="none" stroke="#A7E4FF" stroke-width="1"/>

  <!-- Tape corner (top-left) -->
  <rect x="-2" y="20" width="44" height="18" rx="4" fill="#FFD978" opacity="0.55" transform="rotate(-8, 20, 29)"/>

  <!-- Tape corner (bottom-right) -->
  <rect x="340" y="470" width="44" height="18" rx="4" fill="#FFB7C8" opacity="0.5" transform="rotate(6, 362, 479)"/>

  <!-- Header area -->
  <rect x="30" y="20" width="300" height="40" rx="6" fill="#A7E4FF" opacity="0.2"/>
</svg>
