<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 200" preserveAspectRatio="none">
  <defs>
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBC7"/>
      <stop offset="100%" stop-color="#FFD978"/>
    </linearGradient>
    <linearGradient id="waterEdgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A7E4FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7CCDF2" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Sand base -->
  <path d="M0,80 Q360,60 720,72 Q1080,84 1440,68 L1440,200 L0,200 Z"
        fill="url(#sandGrad)"/>

  <!-- Wet sand edge (water line) -->
  <path d="M0,80 Q360,60 720,72 Q1080,84 1440,68"
        fill="none" stroke="#7CCDF2" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Foam wash -->
  <path d="M0,90 Q200,75 400,85 Q600,95 800,82 Q1000,70 1200,80 Q1360,88 1440,84"
        fill="none" stroke="#FBFEFF" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Shell 1 — spiral -->
  <g transform="translate(160,110)" opacity="0.9">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#FFB7C8" stroke="#FFD7E2" stroke-width="1.5"/>
    <path d="M-10,0 Q0,-8 10,0 Q5,6 0,4 Q-5,2 -8,0" fill="#FFD7E2" opacity="0.7"/>
    <circle cx="4" cy="-2" r="3" fill="#FBFEFF" opacity="0.6"/>
  </g>

  <!-- Shell 2 — fan shape -->
  <g transform="translate(380,130)" opacity="0.85">
    <path d="M0,-15 Q15,0 0,15 Q-15,0 0,-15 Z" fill="#FFEBC7" stroke="#FFD978" stroke-width="1.5"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#FFD978" stroke-width="1" opacity="0.6"/>
    <line x1="-10" y1="-8" x2="10" y2="8" stroke="#FFD978" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="-8" x2="-10" y2="8" stroke="#FFD978" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Starfish -->
  <g transform="translate(640,115)" opacity="0.9">
    <path d="M0,-18 L3,-6 L15,-9 L6,0 L15,9 L3,6 L0,18 L-3,6 L-15,9 L-6,0 L-15,-9 L-3,-6 Z"
          fill="#FFB7C8" stroke="#FFD7E2" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#FFD7E2"/>
  </g>

  <!-- Shell 3 — round spiral -->
  <g transform="translate(900,125)" opacity="0.8">
    <circle cx="0" cy="0" r="14" fill="#7DDEC3" stroke="#A7E4FF" stroke-width="1.5"/>
    <path d="M0,0 Q4,-6 8,0 Q4,6 0,4 Q-4,2 0,0" fill="#FBFEFF" opacity="0.5"/>
    <circle cx="0" cy="0" r="4" fill="#FBFEFF" opacity="0.7"/>
  </g>

  <!-- Small shell 4 -->
  <g transform="translate(1150,118)" opacity="0.85">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#FFD978" stroke="#FFEBC7" stroke-width="1.5"/>
    <path d="M-6,-2 Q0,-7 6,-2 Q3,4 0,3 Q-3,2 -6,-2" fill="#FBFEFF" opacity="0.5"/>
  </g>

  <!-- Foam dots scattered -->
  <g fill="#FBFEFF" opacity="0.7">
    <circle cx="80" cy="88" r="3"/>
    <circle cx="120" cy="84" r="2"/>
    <circle cx="300" cy="82" r="3.5"/>
    <circle cx="480" cy="90" r="2.5"/>
    <circle cx="750" cy="78" r="3"/>
    <circle cx="1000" cy="86" r="2"/>
    <circle cx="1250" cy="82" r="3"/>
    <circle cx="1380" cy="75" r="2.5"/>
  </g>
</svg>
