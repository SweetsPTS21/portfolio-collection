<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 180">
  <defs>
    <linearGradient id="bodyTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A8FAA"/>
      <stop offset="45%" stop-color="#3A7F9C"/>
      <stop offset="100%" stop-color="#2B6A84"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F6FC"/>
      <stop offset="100%" stop-color="#C8E8F5"/>
    </linearGradient>
    <linearGradient id="finGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A7F9C"/>
      <stop offset="100%" stop-color="#1E5A72"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1A3A4A"/>
      <stop offset="100%" stop-color="#0A2030"/>
    </radialGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#1E5A72" flood-opacity="0.25"/>
    </filter>
    <filter id="glowFin">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Water splash base ── -->
  <ellipse cx="68" cy="158" rx="55" ry="10" fill="#A7E4FF" opacity="0.35"/>

  <!-- Spray lines radiating out -->
  <g stroke="#7CCDF2" stroke-linecap="round" opacity="0.75">
    <line x1="30" y1="155" x2="14" y2="136" stroke-width="2"/>
    <line x1="40" y1="152" x2="28" y2="130" stroke-width="2.2"/>
    <line x1="52" y1="150" x2="44" y2="126" stroke-width="2.4"/>
    <line x1="66" y1="149" x2="62" y2="123" stroke-width="2"/>
    <line x1="80" y1="150" x2="80" y2="126" stroke-width="2"/>
    <line x1="92" y1="152" x2="98" y2="130" stroke-width="2"/>
    <line x1="104" y1="155" x2="116" y2="136" stroke-width="1.8"/>
  </g>

  <!-- Water droplets -->
  <g fill="#A7E4FF" opacity="0.85">
    <ellipse cx="16" cy="133" rx="3" ry="4.5" transform="rotate(-20,16,133)"/>
    <ellipse cx="28" cy="127" rx="2.5" ry="4" transform="rotate(-30,28,127)"/>
    <ellipse cx="44" cy="122" rx="2" ry="3.5" transform="rotate(-10,44,122)"/>
    <ellipse cx="62" cy="119" rx="2.5" ry="4" transform="rotate(5,62,119)"/>
    <ellipse cx="80" cy="120" rx="2" ry="3.5" transform="rotate(0,80,120)"/>
    <ellipse cx="98" cy="123" rx="2" ry="3" transform="rotate(15,98,123)"/>
    <ellipse cx="114" cy="131" rx="2.5" ry="4" transform="rotate(25,114,131)"/>
  </g>
  <!-- Tiny droplet dots -->
  <g fill="#BFEAF8" opacity="0.7">
    <circle cx="20" cy="126" r="2"/>
    <circle cx="36" cy="120" r="1.5"/>
    <circle cx="55" cy="114" r="2"/>
    <circle cx="72" cy="112" r="1.8"/>
    <circle cx="90" cy="116" r="2"/>
    <circle cx="108" cy="124" r="1.5"/>
  </g>

  <!-- ── Main dolphin body ── -->
  <!-- Body (smooth S-curve arc for jumping pose) -->
  <path
    d="M58,155
       C50,140 42,118 48,95
       C54,72 70,52 90,36
       C110,20 135,12 155,18
       C172,24 182,38 178,54
       C174,68 162,76 148,80
       C134,84 118,80 104,86
       C90,92 80,104 74,120
       C68,136 66,148 62,155 Z"
    fill="url(#bodyTop)"
    filter="url(#dropShadow)"
  />

  <!-- Belly patch (lighter underside) -->
  <path
    d="M62,152
       C58,138 54,118 60,96
       C66,74 80,56 98,42
       C114,30 136,22 152,28
       C164,34 170,46 166,58
       C162,70 150,76 138,80
       C126,84 112,82 100,88
       C88,94 78,106 72,122
       C66,138 64,148 62,152 Z"
    fill="url(#bellyGrad)"
    opacity="0.55"
  />

  <!-- Body sheen / highlight -->
  <path
    d="M72,100 C78,80 90,62 106,48 C118,36 132,26 146,24"
    fill="none" stroke="#7BBDCE" stroke-width="6" stroke-linecap="round" opacity="0.35"
  />
  <path
    d="M76,108 C82,90 92,74 108,60"
    fill="none" stroke="#9ED0DF" stroke-width="3.5" stroke-linecap="round" opacity="0.25"
  />

  <!-- ── Dorsal fin ── -->
  <path
    d="M118,52
       C124,34 138,20 148,26
       C140,40 132,50 118,52 Z"
    fill="url(#finGrad)"
    stroke="#1E5A72" stroke-width="1.2"
    filter="url(#glowFin)"
  />
  <!-- Dorsal fin ridge line -->
  <path d="M118,52 C128,38 140,26 148,26" fill="none" stroke="#5AAABB" stroke-width="1" opacity="0.5"/>

  <!-- ── Pectoral fin ── -->
  <path
    d="M96,80
       C106,96 104,114 96,118
       C88,108 84,90 96,80 Z"
    fill="url(#finGrad)"
    stroke="#1E5A72" stroke-width="1.2"
    opacity="0.88"
  />

  <!-- ── Tail flukes ── -->
  <path
    d="M62,152
       C52,148 36,144 24,152
       C30,164 46,162 58,155 Z"
    fill="url(#finGrad)"
    stroke="#1E5A72" stroke-width="1.5"
  />
  <path
    d="M62,152
       C56,162 48,174 36,172
       C38,160 50,158 62,155 Z"
    fill="url(#finGrad)"
    stroke="#1E5A72" stroke-width="1.5"
  />
  <!-- Tail notch -->
  <path d="M62,152 C58,155 56,158 58,162" fill="none" stroke="#1E5A72" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Rostrum / beak ── -->
  <path
    d="M158,50
       C170,44 188,40 196,46
       C190,54 174,56 158,52 Z"
    fill="#3A7F9C"
    stroke="#1E5A72" stroke-width="1"
  />
  <!-- Beak tip -->
  <ellipse cx="196" cy="46" rx="5" ry="4" fill="#2B6A84"/>

  <!-- ── Smile ── -->
  <path
    d="M172,52 C178,58 188,58 194,54"
    fill="none" stroke="#1A3A4A" stroke-width="2" stroke-linecap="round"
  />

  <!-- ── Eye ── -->
  <circle cx="163" cy="38" r="8" fill="url(#eyeGrad)" stroke="#0A2030" stroke-width="1.5"/>
  <!-- Eye white highlight -->
  <ellipse cx="160" cy="35" rx="3.5" ry="3" fill="#FBFEFF" opacity="0.9"/>
  <!-- Pupil sparkle -->
  <circle cx="161" cy="35.5" r="1.8" fill="#FBFEFF"/>

  <!-- ── Blowhole ── -->
  <ellipse cx="148" cy="26" rx="5" ry="3" fill="#1E5A72" opacity="0.8"/>
  <ellipse cx="148" cy="26" rx="3" ry="1.8" fill="#0A2030" opacity="0.6"/>

  <!-- ── Water surface line ── -->
  <path
    d="M0,158 C36,154 72,160 108,156 C144,152 180,158 220,155"
    fill="none" stroke="#7CCDF2" stroke-width="3" stroke-linecap="round" opacity="0.65"
  />
  <!-- Foam at entry point -->
  <g fill="#FBFEFF" opacity="0.75">
    <circle cx="55" cy="157" r="4.5"/>
    <circle cx="45" cy="160" r="3"/>
    <circle cx="68" cy="158" r="3.5"/>
    <circle cx="82" cy="156" r="3"/>
    <circle cx="36" cy="158" r="2.5"/>
    <circle cx="96" cy="157" r="2.5"/>
  </g>
  <!-- Second foam ring -->
  <g fill="#EEF9FF" opacity="0.55">
    <circle cx="28" cy="157" r="3.5"/>
    <circle cx="110" cy="157" r="3"/>
  </g>
</svg>
