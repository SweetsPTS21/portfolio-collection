<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Anchor icon -->
  <g transform="translate(40,100)" stroke="#18384A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Circle top -->
    <circle cx="0" cy="-30" r="10" stroke="#2F8FC8" stroke-width="2.5"/>
    <!-- Vertical shaft -->
    <line x1="0" y1="-20" x2="0" y2="30"/>
    <!-- Horizontal bar -->
    <line x1="-20" y1="-30" x2="20" y2="-30"/>
    <!-- Flukes -->
    <path d="M0,30 Q-18,20 -20,10" stroke="#2F8FC8"/>
    <path d="M0,30 Q18,20 20,10" stroke="#2F8FC8"/>
    <!-- Small ring -->
    <circle cx="0" cy="-30" r="4" fill="#2F8FC8" stroke="none"/>
  </g>

  <!-- Rope wavy line -->
  <path d="M80,30 Q100,20 110,40 Q120,60 140,50 Q160,40 165,55 Q170,70 160,80"
        fill="none" stroke="#FFEBC7" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="6,4"/>

  <!-- Wave icon (small) -->
  <g transform="translate(130,130)">
    <path d="M-25,0 Q-12,-10 0,0 Q12,10 25,0" fill="none" stroke="#7CCDF2" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-25,8 Q-12,-2 0,8 Q12,18 25,8" fill="none" stroke="#A7E4FF" stroke-width="2" stroke-linecap="round"/>
    <path d="M-25,16 Q-12,6 0,16 Q12,26 25,16" fill="none" stroke="#7CCDF2" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Home icon (compass rose style) -->
  <g transform="translate(160,60)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#BFEAF8" stroke-width="2"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#2F8FC8" stroke-width="2"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#2F8FC8" stroke-width="2"/>
    <polygon points="0,-14 3,-8 0,-6 -3,-8" fill="#2F8FC8"/>
    <!-- N label -->
    <text x="-3" y="-16" font-size="8" font-family="Quicksand" fill="#2F8FC8" font-weight="700">N</text>
  </g>
</svg>
