<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60">
  <defs>
    <linearGradient id="ribbonGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#FFD978" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FBFEFF" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#FFD978" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="400" cy="30" rx="380" ry="14" fill="url(#ribbonGrad)" filter="url(#glowFilter)"/>
  <ellipse cx="400" cy="30" rx="280" ry="8" fill="#FFD978" opacity="0.3"/>
  <ellipse cx="400" cy="30" rx="180" ry="5" fill="#FBFEFF" opacity="0.6"/>
  <!-- sparkle dots along ribbon -->
  <g fill="#FFD978" opacity="0.9">
    <circle cx="180" cy="28" r="2"/>
    <circle cx="320" cy="26" r="2.5"/>
    <circle cx="400" cy="24" r="3"/>
    <circle cx="480" cy="26" r="2.5"/>
    <circle cx="620" cy="28" r="2"/>
  </g>
</svg>
