<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100">
  <defs>
    <linearGradient id="crabBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A60"/>
      <stop offset="100%" stop-color="#E85A2A"/>
    </linearGradient>
    <linearGradient id="crabLegGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9E70"/>
      <stop offset="100%" stop-color="#D44A20"/>
    </linearGradient>
  </defs>

  <!-- Back legs (left) -->
  <g stroke="url(#crabLegGrad)" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M38,58 Q22,56 14,62"/>
    <path d="M36,64 Q20,65 12,74"/>
    <path d="M36,70 Q22,74 18,84"/>
  </g>
  <!-- Back legs (right) -->
  <g stroke="url(#crabLegGrad)" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M82,58 Q98,56 106,62"/>
    <path d="M84,64 Q100,65 108,74"/>
    <path d="M84,70 Q98,74 102,84"/>
  </g>

  <!-- Claws (left big) -->
  <g>
    <!-- Upper arm -->
    <path d="M34,52 Q18,42 14,34" stroke="#E85A2A" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Claw upper jaw -->
    <path d="M14,34 Q4,28 6,20 Q14,24 14,34" fill="#FF8A60" stroke="#E85A2A" stroke-width="1.5"/>
    <!-- Claw lower jaw -->
    <path d="M14,34 Q6,38 10,44 Q16,40 14,34" fill="#FF8A60" stroke="#E85A2A" stroke-width="1.5"/>
    <!-- Claw tips -->
    <circle cx="7" cy="20" r="2.5" fill="#E85A2A"/>
    <circle cx="11" cy="44" r="2" fill="#E85A2A"/>
  </g>
  <!-- Claws (right big) -->
  <g>
    <path d="M86,52 Q102,42 106,34" stroke="#E85A2A" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M106,34 Q116,28 114,20 Q106,24 106,34" fill="#FF8A60" stroke="#E85A2A" stroke-width="1.5"/>
    <path d="M106,34 Q114,38 110,44 Q104,40 106,34" fill="#FF8A60" stroke="#E85A2A" stroke-width="1.5"/>
    <circle cx="113" cy="20" r="2.5" fill="#E85A2A"/>
    <circle cx="109" cy="44" r="2" fill="#E85A2A"/>
  </g>

  <!-- Body (main carapace) -->
  <ellipse cx="60" cy="58" rx="32" ry="22" fill="url(#crabBodyGrad)" stroke="#C04020" stroke-width="2"/>
  <!-- Body texture lines -->
  <path d="M40,50 Q60,46 80,50" fill="none" stroke="#FF9E70" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M36,56 Q60,52 84,56" fill="none" stroke="#FF9E70" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Body shine -->
  <ellipse cx="52" cy="52" rx="12" ry="6" fill="#FFA878" opacity="0.4"/>

  <!-- Eye stalks -->
  <rect x="50" y="38" width="5" height="14" rx="2.5" fill="#E85A2A"/>
  <rect x="65" y="38" width="5" height="14" rx="2.5" fill="#E85A2A"/>
  <!-- Big cute eyes -->
  <circle cx="52.5" cy="38" r="9" fill="#FBFEFF" stroke="#C04020" stroke-width="1.5"/>
  <circle cx="67.5" cy="38" r="9" fill="#FBFEFF" stroke="#C04020" stroke-width="1.5"/>
  <!-- Pupils -->
  <circle cx="54" cy="39" r="5" fill="#18384A"/>
  <circle cx="69" cy="39" r="5" fill="#18384A"/>
  <!-- Eye sparkle -->
  <circle cx="55.5" cy="37.5" r="2" fill="#FBFEFF"/>
  <circle cx="70.5" cy="37.5" r="2" fill="#FBFEFF"/>
  <!-- Eyelash cute marks -->
  <path d="M47,32 Q52,28 58,32" fill="none" stroke="#C04020" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M62,32 Q67,28 73,32" fill="none" stroke="#C04020" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Mouth / smile -->
  <path d="M52,68 Q60,74 68,68" fill="none" stroke="#C04020" stroke-width="2" stroke-linecap="round"/>
  <!-- Cute cheek blush -->
  <ellipse cx="44" cy="64" rx="6" ry="4" fill="#FFB7C8" opacity="0.5"/>
  <ellipse cx="76" cy="64" rx="6" ry="4" fill="#FFB7C8" opacity="0.5"/>

  <!-- Sand beneath crab -->
  <ellipse cx="60" cy="82" rx="38" ry="6" fill="#FFEBC7" opacity="0.5"/>
</svg>
