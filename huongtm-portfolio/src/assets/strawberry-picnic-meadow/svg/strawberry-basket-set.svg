<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%" aria-hidden="true">
  <defs>
    <!-- Shadow filter for elements -->
    <filter id="stickerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#4A2535" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Element 1: Cute Full Strawberry -->
  <g id="strawberry-full" transform="translate(100, 100)" filter="url(#stickerShadow)">
    <path d="M 0,60 C -35,55 -50,15 -50,-10 C -50,-35 -25,-45 0,-45 C 25,-45 50,-35 50,-10 C 50,15 35,60 0,60 Z" fill="#F4A7BE" stroke="#4A2535" stroke-width="4" stroke-linejoin="round" />
    <!-- Seeds -->
    <circle cx="-20" cy="-10" r="3" fill="#FFE89A" />
    <circle cx="20" cy="-10" r="3" fill="#FFE89A" />
    <circle cx="0" cy="-20" r="3" fill="#FFE89A" />
    <circle cx="-10" cy="15" r="3" fill="#FFE89A" />
    <circle cx="10" cy="15" r="3" fill="#FFE89A" />
    <circle cx="-25" cy="15" r="2.5" fill="#FFE89A" />
    <circle cx="25" cy="15" r="2.5" fill="#FFE89A" />
    <circle cx="0" cy="40" r="3" fill="#FFE89A" />
    <circle cx="0" cy="10" r="3.5" fill="#FFE89A" />
    <!-- Calyx/Green Leaf -->
    <path d="M 0,-45 L -20,-55 L -10,-38 L -30,-32 L -5,-25 L 0,-48 L 5,-25 L 30,-32 L 10,-38 L 20,-55 Z" fill="#A8EDCA" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
    <!-- Glossy Highlight -->
    <path d="M -30,-15 C -30,-30 -15,-35 -5,-35" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.6" />
  </g>

  <!-- Element 2: Soft Strawberries Cluster -->
  <g id="strawberry-cluster" transform="translate(280, 100)" scale="0.8" filter="url(#stickerShadow)">
    <!-- Back strawberry -->
    <g transform="translate(-30, 20) rotate(-20)">
      <path d="M 0,50 C -30,45 -40,10 -40,-10 C -40,-30 -20,-40 0,-40 C 20,-40 40,-30 40,-10 C 40,10 30,50 0,50 Z" fill="#F9C8D8" stroke="#4A2535" stroke-width="4" stroke-linejoin="round" />
      <circle cx="-15" cy="-5" r="2.5" fill="#FFE89A" />
      <circle cx="15" cy="-5" r="2.5" fill="#FFE89A" />
      <circle cx="0" cy="-15" r="2.5" fill="#FFE89A" />
      <circle cx="-10" cy="15" r="2.5" fill="#FFE89A" />
      <circle cx="10" cy="15" r="2.5" fill="#FFE89A" />
      <circle cx="0" cy="32" r="2.5" fill="#FFE89A" />
      <path d="M 0,-40 L -15,-48 L -8,-33 L -24,-28 L -4,-22 L 0,-43 L 4,-22 L 24,-28 L 8,-33 L 15,-48 Z" fill="#A8EDCA" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
    </g>
    <!-- Front strawberry -->
    <g transform="translate(20, 10) rotate(15)">
      <path d="M 0,50 C -30,45 -40,10 -40,-10 C -40,-30 -20,-40 0,-40 C 20,-40 40,-30 40,-10 C 40,10 30,50 0,50 Z" fill="#F4A7BE" stroke="#4A2535" stroke-width="4" stroke-linejoin="round" />
      <circle cx="-15" cy="-5" r="2.5" fill="#FFE89A" />
      <circle cx="15" cy="-5" r="2.5" fill="#FFE89A" />
      <circle cx="0" cy="-15" r="2.5" fill="#FFE89A" />
      <circle cx="-10" cy="15" r="2.5" fill="#FFE89A" />
      <circle cx="10" cy="15" r="2.5" fill="#FFE89A" />
      <circle cx="0" cy="32" r="2.5" fill="#FFE89A" />
      <path d="M 0,-40 L -15,-48 L -8,-33 L -24,-28 L -4,-22 L 0,-43 L 4,-22 L 24,-28 L 8,-33 L 15,-48 Z" fill="#A8EDCA" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
      <path d="M -22,-10 C -22,-22 -10,-26 -2,-26" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    </g>
  </g>

  <!-- Element 3: Cozy Woven Picnic Basket SVG -->
  <g id="basket-sticker" transform="translate(200, 270)" filter="url(#stickerShadow)">
    <ellipse cx="0" cy="35" rx="90" ry="15" fill="#4A2535" fill-opacity="0.1" />
    <!-- Handle -->
    <path d="M -70,5 C -70,-55 70,-55 70,5" fill="none" stroke="#E8C99A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -70,5 C -70,-55 70,-55 70,5" fill="none" stroke="#4A2535" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -68,3 C -68,-52 68,-52 68,3" fill="none" stroke="#D1A76E" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 6" />
    <!-- Basket Outer -->
    <path d="M -80,5 C -75,45 -55,60 0,60 C 55,60 75,45 80,5 Z" fill="#E8C99A" stroke="#4A2535" stroke-width="4.5" stroke-linejoin="round" />
    <!-- Gingham napkin hanging out -->
    <path d="M -50,5 L -35,30 L -10,35 L 20,15 L 45,35 L 60,5 Z" fill="#FFB8D0" stroke="#4A2535" stroke-width="3.5" stroke-linejoin="round" />
    <path d="M -42,5 L -32,22 L -12,27 L 18,12 L 40,25 L 52,5" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 4" />
    <!-- Basket Rim -->
    <rect x="-85" y="-3" width="170" height="12" rx="6" fill="#D1A76E" stroke="#4A2535" stroke-width="4" />
  </g>
</svg>
