<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="100%" aria-hidden="true">
  <!-- Cluster 1: Soft Daisy Stem & Flower -->
  <g id="flower-daisy" transform="translate(60, 150)">
    <!-- Stem Group -->
    <path d="M 0,50 Q -12,15 -5,-25" fill="none" stroke="#A8EDCA" stroke-width="4.5" stroke-linecap="round" />
    <path d="M -8,25 Q -24,15 -14,-5" fill="none" stroke="#A8EDCA" stroke-width="3" stroke-linecap="round" />
    <!-- Flower head -->
    <g class="sway-head" transform="translate(-5, -25)">
      <circle cx="0" cy="0" r="8" fill="#FFE89A" stroke="#4A2535" stroke-width="2.5" />
      <!-- Petals -->
      <circle cx="-13" cy="0" r="6" fill="#FFFFFF" stroke="#4A2535" stroke-width="2" />
      <circle cx="13" cy="0" r="6" fill="#FFFFFF" stroke="#4A2535" stroke-width="2" />
      <circle cx="0" cy="-13" r="6" fill="#FFFFFF" stroke="#4A2535" stroke-width="2" />
      <circle cx="0" cy="13" r="6" fill="#FFFFFF" stroke="#4A2535" stroke-width="2" />
      <circle cx="-9" cy="-9" r="6" fill="#FFFFFF" stroke="#4A2535" stroke-width="2" />
      <circle cx="9" cy="9" r="6" fill="#FFFFFF" stroke="#4A2535" stroke-width="2" />
      <circle cx="-9" cy="9" r="6" fill="#FFFFFF" stroke="#4A2535" stroke-width="2" />
      <circle cx="9" cy="-9" r="6" fill="#FFFFFF" stroke="#4A2535" stroke-width="2" />
      <!-- Center Core over petals -->
      <circle cx="0" cy="0" r="8" fill="#FFE89A" />
    </g>
  </g>

  <!-- Cluster 2: Soft Spring Tulip -->
  <g id="flower-tulip" transform="translate(150, 150)">
    <path d="M 0,50 Q 8,18 2,-20" fill="none" stroke="#A8EDCA" stroke-width="4.5" stroke-linecap="round" />
    <path d="M 4,28 Q 20,20 15,2" fill="none" stroke="#A8EDCA" stroke-width="3.5" stroke-linecap="round" />
    <!-- Tulip Blossom -->
    <g class="sway-head" transform="translate(2, -20)">
      <!-- Outer Petals -->
      <path d="M -15,10 C -25,-15 0,-25 0,-25 C 0,-25 25,-15 15,10 C 10,20 -10,20 -15,10 Z" fill="#F4A7BE" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
      <!-- Inner Petals -->
      <path d="M -8,5 C -12,-10 0,-18 0,-18 C 0,-18 12,-10 8,5 C 6,12 -6,12 -8,5 Z" fill="#F9C8D8" stroke="#4A2535" stroke-width="2" />
      <!-- Center Pistil -->
      <circle cx="0" cy="-5" r="3" fill="#FFE89A" />
    </g>
  </g>

  <!-- Cluster 3: Lucky Clover Patch -->
  <g id="flower-clover" transform="translate(240, 150)">
    <path d="M 0,50 Q -5,30 -2,5" fill="none" stroke="#A8EDCA" stroke-width="4" stroke-linecap="round" />
    <!-- Clover Stalk -->
    <g class="sway-head" transform="translate(-2, 5)">
      <!-- 4 Hearts Clover -->
      <g transform="rotate(0)">
        <path d="M 0,0 C -12,-12 -22,-2 -10,5 Z" fill="#A8EDCA" stroke="#4A2535" stroke-width="2" />
      </g>
      <g transform="rotate(90)">
        <path d="M 0,0 C -12,-12 -22,-2 -10,5 Z" fill="#A8EDCA" stroke="#4A2535" stroke-width="2" />
      </g>
      <g transform="rotate(180)">
        <path d="M 0,0 C -12,-12 -22,-2 -10,5 Z" fill="#A8EDCA" stroke="#4A2535" stroke-width="2" />
      </g>
      <g transform="rotate(270)">
        <path d="M 0,0 C -12,-12 -22,-2 -10,5 Z" fill="#A8EDCA" stroke="#4A2535" stroke-width="2" />
      </g>
      <circle cx="0" cy="0" r="3.5" fill="#FFE89A" />
    </g>
  </g>
</svg>
