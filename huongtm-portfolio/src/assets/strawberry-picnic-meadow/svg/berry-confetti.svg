<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" aria-hidden="true">
  <!-- Tiny Strawberry Confetti -->
  <g id="confetti-berry" transform="translate(20, 20) scale(0.35)">
    <path d="M 0,35 C -18,32 -25,8 -25,-8 C -25,-22 -12,-30 0,-30 C 12,-30 25,-22 25,-8 C 25,8 18,35 0,35 Z" fill="#F4A7BE" stroke="#4A2535" stroke-width="4.5" />
    <path d="M 0,-30 L -10,-35 L -5,-22 L -15,-20 L -2,-12 Z" fill="#A8EDCA" />
  </g>

  <!-- Tiny Heart Confetti -->
  <g id="confetti-heart" transform="translate(60, 20) scale(0.3)">
    <path d="M 0,15 C -20,5 -30,-15 -15,-25 C -5,-30 0,-15 0,-15 C 0,-15 5,-30 15,-25 C 30,-15 20,5 0,15 Z" fill="#F9C8D8" stroke="#4A2535" stroke-width="5" stroke-linejoin="round" />
  </g>

  <!-- Tiny Seed Sparkle -->
  <g id="confetti-seed" transform="translate(20, 65) scale(0.35)">
    <path d="M 0,15 Q -10,0 0,-15 Q 10,0 0,15 Z" fill="#FFE89A" stroke="#4A2535" stroke-width="4" />
  </g>

  <!-- Tiny Flower Confetti -->
  <g id="confetti-flower" transform="translate(60, 65) scale(0.3)">
    <circle cx="0" cy="0" r="8" fill="#FFE89A" stroke="#4A2535" stroke-width="4" />
    <circle cx="-13" cy="0" r="8" fill="#FFFFFF" stroke="#4A2535" stroke-width="3" />
    <circle cx="13" cy="0" r="8" fill="#FFFFFF" stroke="#4A2535" stroke-width="3" />
    <circle cx="0" cy="-13" r="8" fill="#FFFFFF" stroke="#4A2535" stroke-width="3" />
    <circle cx="0" cy="13" r="8" fill="#FFFFFF" stroke="#4A2535" stroke-width="3" />
    <circle cx="0" cy="0" r="8" fill="#FFE89A" />
  </g>
</svg>
