<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <!-- Gingham Pattern -->
    <pattern id="ginghamBg" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#FFE8F0" />
      <rect width="20" height="40" fill="#FFB8D0" fill-opacity="0.4" />
      <rect width="40" height="20" fill="#FFB8D0" fill-opacity="0.4" />
      <rect width="20" height="20" fill="#FFB8D0" fill-opacity="0.3" />
    </pattern>
    <!-- Soft Gradient Sky -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8FA" />
      <stop offset="70%" stop-color="#FFF0F5" />
      <stop offset="100%" stop-color="#FFE8F0" />
    </linearGradient>
    <!-- Gentle Sun Glow -->
    <radialGradient id="sunGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFE89A" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#FFF8FA" stop-opacity="0" />
    </radialGradient>
    <!-- Hill Gradients -->
    <linearGradient id="hillBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8F5E2" />
      <stop offset="100%" stop-color="#A8EDCA" />
    </linearGradient>
    <linearGradient id="hillFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B2F7D6" />
      <stop offset="100%" stop-color="#9CEABF" />
    </linearGradient>
    <!-- Soft Drop Shadow for blanket -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4A2535" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Layer 0: Sky and Glow -->
  <rect width="1440" height="900" fill="url(#skyGrad)" />
  <circle cx="720" cy="200" r="600" fill="url(#sunGlow)" />

  <!-- Layer 1: Distant Soft Hills (Back Ground) -->
  <path d="M 0,550 Q 360,460 720,530 T 1440,490 L 1440,900 L 0,900 Z" fill="url(#hillBack)" opacity="0.8" />
  
  <!-- Layer 2: Mid Hills with Trees & Daisies -->
  <path d="M 0,620 Q 380,550 780,630 T 1440,580 L 1440,900 L 0,900 Z" fill="url(#hillFront)" />

  <!-- Layer 3: Gingham Blanket Layout (Centered/Bottom-heavy) -->
  <g transform="translate(720, 750) rotate(-4)" filter="url(#softShadow)">
    <!-- Blanket Shadow Frame -->
    <rect x="-350" y="-120" width="700" height="240" rx="40" fill="url(#ginghamBg)" />
    <!-- Gingham Border -->
    <rect x="-345" y="-115" width="690" height="230" rx="35" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    <rect x="-342" y="-112" width="684" height="224" rx="32" fill="none" stroke="#F4C8D8" stroke-width="2" stroke-dasharray="10 6" />
  </g>

  <!-- Reusable Meadow Elements -->
  <!-- Cute Daisy Stalks (Bottom-Left) -->
  <g transform="translate(150, 780)">
    <path d="M 0,0 Q -10,-40 -5,-80" fill="none" stroke="#A8EDCA" stroke-width="4" stroke-linecap="round" />
    <path d="M -15,-5 Q -25,-25 -10,-45" fill="none" stroke="#A8EDCA" stroke-width="3" stroke-linecap="round" />
    <!-- Daisy Flower -->
    <g transform="translate(-5, -80)">
      <circle cx="0" cy="0" r="10" fill="#FFE89A" />
      <circle cx="-15" cy="0" r="8" fill="#FFFFFF" />
      <circle cx="15" cy="0" r="8" fill="#FFFFFF" />
      <circle cx="0" cy="-15" r="8" fill="#FFFFFF" />
      <circle cx="0" cy="15" r="8" fill="#FFFFFF" />
      <circle cx="-11" cy="-11" r="8" fill="#FFFFFF" />
      <circle cx="11" cy="11" r="8" fill="#FFFFFF" />
      <circle cx="-11" cy="11" r="8" fill="#FFFFFF" />
      <circle cx="11" cy="-11" r="8" fill="#FFFFFF" />
    </g>
  </g>

  <!-- Reusable Basket (Bottom-Right) -->
  <g transform="translate(1220, 780) scale(1.2)">
    <!-- Basket shadow -->
    <ellipse cx="0" cy="20" rx="65" ry="12" fill="#4A2535" fill-opacity="0.1" />
    <!-- Basket body -->
    <path d="M -50,-10 C -45,15 -35,30 0,30 C 35,30 45,15 50,-10 Z" fill="#E8C99A" stroke="#4A2535" stroke-width="3.5" stroke-linejoin="round" />
    <!-- Basket weave details -->
    <path d="M -40,-10 Q 0,0 40,-10 M -45,10 Q 0,20 45,10 M -20,-10 L -25,25 M 0,-10 L 0,30 M 20,-10 L 25,25" fill="none" stroke="#D1A76E" stroke-width="2" />
    <!-- Handle -->
    <path d="M -48,-8 C -48,-48 48,-48 48,-8" fill="none" stroke="#E8C99A" stroke-width="5" stroke-linecap="round" />
    <path d="M -48,-8 C -48,-48 48,-48 48,-8" fill="none" stroke="#D1A76E" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8 5" />
    <!-- Strawberry inside -->
    <g transform="translate(-10,-10) rotate(-15) scale(0.6)">
      <path d="M 0,25 C -15,22 -20,5 -20,-5 C -20,-15 -10,-20 0,-20 C 10,-20 20,-15 20,-5 C 20,5 15,22 0,25 Z" fill="#F4A7BE" />
      <!-- Calyx -->
      <path d="M 0,-20 L -8,-25 L -4,-18 L -12,-16 L -2,-12 L 0,-22 L 2,-12 L 12,-16 L 4,-18 L 8,-25 Z" fill="#A8EDCA" />
    </g>
    <g transform="translate(15,-8) rotate(20) scale(0.55)">
      <path d="M 0,25 C -15,22 -20,5 -20,-5 C -20,-15 -10,-20 0,-20 C 10,-20 20,-15 20,-5 C 20,5 15,22 0,25 Z" fill="#F9C8D8" />
      <path d="M 0,-20 L -8,-25 L -4,-18 L -12,-16 L -2,-12 L 0,-22 L 2,-12 L 12,-16 L 4,-18 L 8,-25 Z" fill="#A8EDCA" />
    </g>
  </g>
</svg>
