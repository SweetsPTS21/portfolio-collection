<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%" aria-hidden="true">
  <defs>
    <!-- Gingham Pattern definition -->
    <pattern id="cardGingham" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#FFF8FA" />
      <rect width="10" height="20" fill="#FFB8D0" fill-opacity="0.35" />
      <rect width="20" height="10" fill="#FFB8D0" fill-opacity="0.35" />
      <rect width="10" height="10" fill="#FFB8D0" fill-opacity="0.25" />
    </pattern>
    <filter id="softPaperShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#4A2535" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Element 1: Checkered Washi Tape -->
  <g id="washi-tape" transform="translate(50, 50)" filter="url(#softPaperShadow)">
    <rect x="0" y="0" width="160" height="30" fill="url(#cardGingham)" stroke="#4A2535" stroke-width="2" />
    <!-- Jagged Torn edges -->
    <path d="M 0,0 L 5,15 L 0,30" fill="#FFF8FA" stroke="#4A2535" stroke-width="2" />
    <path d="M 160,0 L 155,15 L 160,30" fill="#FFF8FA" stroke="#4A2535" stroke-width="2" />
  </g>

  <!-- Element 2: Corner Gingham Patch (Top Left Style) -->
  <g id="gingham-corner" transform="translate(300, 50)">
    <path d="M 0,0 L 80,0 L 0,80 Z" fill="url(#cardGingham)" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
    <path d="M 10,10 L 60,10 L 10,60 Z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4 3" />
  </g>

  <!-- Element 3: Pretty Gingham Ribbon Bow -->
  <g id="ribbon-bow" transform="translate(200, 250)" filter="url(#softPaperShadow)">
    <!-- Left Loop -->
    <path d="M 0,0 C -50,-50 -80,-10 -40,10 C -20,20 0,0 0,0" fill="#F4A7BE" stroke="#4A2535" stroke-width="3.5" stroke-linejoin="round" />
    <path d="M 0,0 C -45,-45 -70,-10 -35,5" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3" />
    
    <!-- Right Loop -->
    <path d="M 0,0 C 50,-50 80,-10 40,10 C 20,20 0,0 0,0" fill="#F4A7BE" stroke="#4A2535" stroke-width="3.5" stroke-linejoin="round" />
    <path d="M 0,0 C 45,-45 70,-10 35,5" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3" />

    <!-- Left Tail -->
    <path d="M -5,5 C -25,25 -40,55 -50,65 L -35,70 C -25,50 -10,25 -5,5" fill="#F4A7BE" stroke="#4A2535" stroke-width="3.5" stroke-linejoin="round" />
    <!-- Right Tail -->
    <path d="M 5,5 C 25,25 40,55 50,65 L 35,70 C 25,50 10,25 5,5" fill="#F4A7BE" stroke="#4A2535" stroke-width="3.5" stroke-linejoin="round" />
    
    <!-- Center Knot -->
    <circle cx="0" cy="0" r="14" fill="#FFB8D0" stroke="#4A2535" stroke-width="3.5" />
    <circle cx="0" cy="0" r="6" fill="#F4A7BE" />
  </g>
</svg>
