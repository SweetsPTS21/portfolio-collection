<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" aria-hidden="true">
  <!-- Style for wings and bodies to allow animations -->
  <style>
    @keyframes flapLeft {
      0%, 100% { transform: scaleX(1); }
      50% { transform: scaleX(0.2); }
    }
    @keyframes flapRight {
      0%, 100% { transform: scaleX(1); }
      50% { transform: scaleX(0.2); }
    }
    .wing-left {
      animation: flapLeft 0.15s ease-in-out infinite;
      transform-origin: 20px 0px;
    }
    .wing-right {
      animation: flapRight 0.15s ease-in-out infinite;
      transform-origin: -20px 0px;
    }
  </style>

  <!-- Character 1: Whimsical Honey Bee -->
  <g id="honey-bee" transform="translate(60, 100)">
    <!-- Wings (Drawn above body) -->
    <g class="wing-left" transform="translate(-10, -18)">
      <ellipse cx="0" cy="0" rx="14" ry="8" fill="#FFF8FA" fill-opacity="0.8" stroke="#4A2535" stroke-width="2" transform="rotate(-40)" />
    </g>
    <g class="wing-right" transform="translate(10, -18)">
      <ellipse cx="0" cy="0" rx="14" ry="8" fill="#FFF8FA" fill-opacity="0.8" stroke="#4A2535" stroke-width="2" transform="rotate(40)" />
    </g>

    <!-- Bee Body -->
    <g class="bee-body">
      <!-- Shadow -->
      <ellipse cx="0" cy="22" rx="18" ry="4" fill="#4A2535" fill-opacity="0.08" />
      <!-- Striped Body -->
      <rect x="-18" y="-12" width="36" height="24" rx="12" fill="#FFE89A" stroke="#4A2535" stroke-width="3.5" />
      <!-- Stripes -->
      <path d="M -6,-12 L -6,12 M 4,-12 L 4,12" stroke="#4A2535" stroke-width="4.5" />
      <!-- Eyes & Cheeks -->
      <circle cx="-10" cy="-2" r="2.5" fill="#4A2535" />
      <circle cx="-6" cy="3" r="3" fill="#F4A7BE" />
      <!-- Stinger -->
      <path d="M 18,-2 L 24,0 L 18,2 Z" fill="#4A2535" />
      <!-- Antennae -->
      <path d="M -12,-12 Q -16,-20 -10,-24" fill="none" stroke="#4A2535" stroke-width="2" stroke-linecap="round" />
      <circle cx="-10" cy="-24" r="2" fill="#4A2535" />
    </g>
  </g>

  <!-- Character 2: Whimsical Pastel Butterfly -->
  <g id="pastel-butterfly" transform="translate(140, 100)">
    <ellipse cx="0" cy="24" rx="14" ry="4" fill="#4A2535" fill-opacity="0.08" />
    
    <!-- Left Wing Group -->
    <g class="wing-left" transform="translate(-4, 0)">
      <!-- Top Wing -->
      <path d="M 0,0 C -30,-40 -45,-15 -25,5 C -15,15 0,0 0,0" fill="#F4A7BE" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
      <circle cx="-16" cy="-12" r="4" fill="#FFF5CC" />
      <!-- Bottom Wing -->
      <path d="M 0,0 C -25,25 -35,5 -15,-5 C -5,-10 0,0 0,0" fill="#D8B8FF" stroke="#4A2535" stroke-width="2.5" stroke-linejoin="round" />
    </g>

    <!-- Right Wing Group -->
    <g class="wing-right" transform="translate(4, 0)">
      <!-- Top Wing -->
      <path d="M 0,0 C 30,-40 45,-15 25,5 C 15,15 0,0 0,0" fill="#F4A7BE" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
      <circle cx="16" cy="-12" r="4" fill="#FFF5CC" />
      <!-- Bottom Wing -->
      <path d="M 0,0 C 25,25 35,5 15,-5 C 5,-10 0,0 0,0" fill="#D8B8FF" stroke="#4A2535" stroke-width="2.5" stroke-linejoin="round" />
    </g>

    <!-- Body & Antennae -->
    <g class="butterfly-body">
      <!-- Body Center -->
      <rect x="-3" y="-14" width="6" height="28" rx="3" fill="#E8C99A" stroke="#4A2535" stroke-width="2.5" />
      <circle cx="0" cy="-14" r="5" fill="#E8C99A" stroke="#4A2535" stroke-width="2.5" />
      <!-- Antennae -->
      <path d="M -2,-18 Q -8,-25 -4,-28" fill="none" stroke="#4A2535" stroke-width="1.5" stroke-linecap="round" />
      <path d="M 2,-18 Q 8,-25 4,-28" fill="none" stroke="#4A2535" stroke-width="1.5" stroke-linecap="round" />
    </g>
  </g>
</svg>
