<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" width="100%" height="100%" aria-hidden="true">
  <!-- Soft outline style for treats: stroke #4A2535, fill pastel colors -->
  
  <!-- Treat 1: Jam Jar (Chương 3 - Sparkles / AI / Jam jar reference) -->
  <g id="treat-jam" transform="translate(50, 50)">
    <!-- Shadow -->
    <ellipse cx="0" cy="38" rx="25" ry="6" fill="#4A2535" fill-opacity="0.1" />
    <!-- Jar glass -->
    <rect x="-24" y="-20" width="48" height="52" rx="12" fill="#FFE8F0" stroke="#4A2535" stroke-width="3" />
    <path d="M -24,5 Q 0,15 24,5" fill="none" stroke="#4A2535" stroke-width="2" />
    <!-- Jam filling inside -->
    <rect x="-20" y="-8" width="40" height="36" rx="8" fill="#F4A7BE" />
    <!-- Label -->
    <rect x="-16" y="-6" width="32" height="20" rx="4" fill="#FFFFFF" stroke="#4A2535" stroke-width="2" />
    <circle cx="0" cy="4" r="3" fill="#FFE89A" />
    <!-- Jar Lid (Cloth tied with string) -->
    <path d="M -28,-22 C -28,-28 28,-28 28,-22 C 28,-18 20,-16 20,-16 L -20,-16 C -20,-16 -28,-18 -28,-22 Z" fill="#FFB8D0" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
    <!-- String / Bow -->
    <line x1="-22" y1="-16" x2="22" y2="-16" stroke="#4A2535" stroke-width="2" />
    <circle cx="0" cy="-16" r="4" fill="#E8C99A" stroke="#4A2535" stroke-width="1.5" />
  </g>

  <!-- Treat 2: Cake Slice (Chương 5 - Film / Sáng tạo nội dung) -->
  <g id="treat-cake" transform="translate(150, 50)">
    <ellipse cx="0" cy="38" rx="30" ry="6" fill="#4A2535" fill-opacity="0.1" />
    <!-- Cake layers -->
    <path d="M -30,25 L 25,32 L 25,0 L -30,-8 Z" fill="#FFE8F0" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
    <!-- Top slice slope -->
    <path d="M -30,-8 L 25,0 L 0,-32 Z" fill="#FFF8FA" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
    <!-- Jam cream middle layer -->
    <path d="M -30,8 Q 0,14 25,16" fill="none" stroke="#F4A7BE" stroke-width="5" stroke-linecap="round" />
    <!-- Strawberry on top -->
    <g transform="translate(0, -22) scale(0.4)">
      <path d="M 0,25 C -15,22 -20,5 -20,-5 C -20,-15 -10,-20 0,-20 C 10,-20 20,-15 20,-5 C 20,5 15,22 0,25 Z" fill="#F4A7BE" stroke="#4A2535" stroke-width="6" />
      <path d="M 0,-20 L -8,-25 L -4,-18 L -12,-16 L -2,-12 L 0,-22 Z" fill="#A8EDCA" />
    </g>
  </g>

  <!-- Treat 3: Sweet Macaron (Chương 2 - Search / Khai thác) -->
  <g id="treat-macaron" transform="translate(250, 50)">
    <ellipse cx="0" cy="36" rx="25" ry="6" fill="#4A2535" fill-opacity="0.1" />
    <!-- Top Shell -->
    <path d="M -22,6 C -22,-14 22,-14 22,6 Z" fill="#D8B8FF" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
    <!-- Filling Layer (Carol ruffle style) -->
    <rect x="-24" y="6" width="48" height="6" rx="3" fill="#FFF8FA" stroke="#4A2535" stroke-width="2" />
    <!-- Bottom Shell -->
    <path d="M -22,12 C -22,32 22,32 22,12 Z" fill="#D8B8FF" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
  </g>

  <!-- Treat 4: Lemonade Cup (Chương 4 - Users / Hợp tác nhóm) -->
  <g id="treat-lemonade" transform="translate(350, 50)">
    <ellipse cx="0" cy="38" rx="20" ry="5" fill="#4A2535" fill-opacity="0.1" />
    <!-- Straw -->
    <line x1="4" y1="-32" x2="-14" y2="15" stroke="#FBDCE8" stroke-width="6" stroke-linecap="round" />
    <line x1="4" y1="-32" x2="-14" y2="15" stroke="#4A2535" stroke-width="3" stroke-linecap="round" stroke-dasharray="4 4" />
    <!-- Glass cup -->
    <path d="M -20,-20 L -12,30 C -10,35 10,35 12,30 L 20,-20 Z" fill="none" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
    <!-- Lemon liquid -->
    <path d="M -17,-5 L -12,24 C -10,28 10,28 12,24 L 17,-5 Z" fill="#FFE89A" fill-opacity="0.9" />
    <!-- Lemon slice details -->
    <circle cx="0" cy="5" r="8" fill="#FFF5CC" stroke="#4A2535" stroke-width="1.5" />
    <line x1="0" y1="5" x2="5" y2="10" stroke="#4A2535" stroke-width="1" />
    <line x1="0" y1="5" x2="-5" y2="-2" stroke="#4A2535" stroke-width="1" />
  </g>

  <!-- Treat 5: Triangle Sandwich (Chương 1 - FileText / Tổ chức) -->
  <g id="treat-sandwich" transform="translate(450, 50)">
    <ellipse cx="0" cy="38" rx="28" ry="6" fill="#4A2535" fill-opacity="0.1" />
    <!-- Bread bottom -->
    <path d="M -30,22 L 20,28 L 0,-15 Z" fill="#E8C99A" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
    <!-- Green Lettuce filling -->
    <path d="M -28,15 Q -10,25 20,18" fill="none" stroke="#A8EDCA" stroke-width="6" stroke-linecap="round" />
    <!-- Cheese slice -->
    <path d="M -25,18 L 10,12 L 0,8 Z" fill="#FFE89A" />
    <!-- Bread top -->
    <path d="M -30,12 L 20,18 L 0,-25 Z" fill="#E8C99A" stroke="#4A2535" stroke-width="3" stroke-linejoin="round" />
  </g>
</svg>
