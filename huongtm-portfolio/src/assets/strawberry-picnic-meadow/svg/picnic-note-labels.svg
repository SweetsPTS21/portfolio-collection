<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%" aria-hidden="true">
  <defs>
    <filter id="softPaperShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#4A2535" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Element 1: Polaroid Frame (Thick bordered photo frame) -->
  <g id="polaroid-frame" transform="translate(100, 100)" filter="url(#softPaperShadow)">
    <!-- White paper border -->
    <rect x="-65" y="-75" width="130" height="170" rx="10" fill="#FFFFFF" stroke="#4A2535" stroke-width="3" />
    <!-- Outer line dash -->
    <rect x="-58" y="-68" width="116" height="156" rx="6" fill="none" stroke="#F4C8D8" stroke-width="1.5" stroke-dasharray="6 4" />
    <!-- Photo Area (Square) -->
    <rect x="-50" y="-60" width="100" height="100" rx="4" fill="#FFE8F0" stroke="#4A2535" stroke-width="2.5" />
    <!-- Clip placement zone -->
    <circle cx="0" cy="-75" r="4" fill="#4A2535" opacity="0.1" />
  </g>

  <!-- Element 2: Strawberry Clip (Clothes peg clip for polaroid photo) -->
  <g id="strawberry-clip" transform="translate(260, 80)" filter="url(#softPaperShadow)">
    <!-- Wooden peg stick back -->
    <rect x="-6" y="-30" width="12" height="60" rx="4" fill="#E8C99A" stroke="#4A2535" stroke-width="2.5" />
    <!-- Metal spring loop -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#4A2535" stroke-width="3.5" />
    <!-- Front Strawberry Peg Clip -->
    <g transform="translate(0, 5) scale(0.4)">
      <path d="M 0,35 C -18,32 -25,8 -25,-8 C -25,-22 -12,-30 0,-30 C 12,-30 25,-22 25,-8 C 25,8 18,35 0,35 Z" fill="#F4A7BE" stroke="#4A2535" stroke-width="6" />
      <circle cx="-8" cy="-5" r="3" fill="#FFE89A" />
      <circle cx="8" cy="-5" r="3" fill="#FFE89A" />
      <path d="M 0,-30 L -12,-36 L -6,-22 L -18,-18 Z" fill="#A8EDCA" stroke="#4A2535" stroke-width="3" />
    </g>
  </g>

  <!-- Element 3: Round Sticker Jam Label -->
  <g id="jam-label" transform="translate(200, 260)" filter="url(#softPaperShadow)">
    <circle cx="0" cy="0" r="40" fill="#FFF8FA" stroke="#4A2535" stroke-width="4" />
    <!-- Inner dashed border -->
    <circle cx="0" cy="0" r="33" fill="none" stroke="#FFB8D0" stroke-width="2" stroke-dasharray="6 4" />
    <!-- Center icon circle -->
    <circle cx="0" cy="0" r="22" fill="#FBDCE8" />
    <!-- Little strawberry -->
    <path d="M 0,10 C -6,9 -8,2 -8,-3 C -8,-7 -4,-10 0,-10 C 4,-10 8,-7 8,-3 C 8,2 6,9 0,10 Z" fill="#F4A7BE" />
  </g>
</svg>
