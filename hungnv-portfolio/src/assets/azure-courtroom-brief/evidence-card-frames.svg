<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 400" fill="none">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#12304A" flood-opacity="0.12" />
    </filter>
  </defs>
  <!-- Main Card Paper Body -->
  <rect x="15" y="15" width="320" height="370" rx="8" fill="#FFFFFF" filter="url(#shadow)" stroke="#C4E2F5" stroke-width="1.5" />
  
  <!-- Left Red Margin Rule -->
  <line x1="55" y1="15" x2="55" y2="385" stroke="#D9576A" stroke-width="1" opacity="0.6" />
  
  <!-- Horizontal Paper Lines -->
  <g stroke="#E3F2FD" stroke-width="1">
    <line x1="15" y1="60" x2="335" y2="60" />
    <line x1="15" y1="90" x2="335" y2="90" />
    <line x1="15" y1="120" x2="335" y2="120" />
    <line x1="15" y1="150" x2="335" y2="150" />
    <line x1="15" y1="180" x2="335" y2="180" />
    <line x1="15" y1="210" x2="335" y2="210" />
    <line x1="15" y1="240" x2="335" y2="240" />
    <line x1="15" y1="270" x2="335" y2="270" />
    <line x1="15" y1="300" x2="335" y2="300" />
    <line x1="15" y1="330" x2="335" y2="330" />
    <line x1="15" y1="360" x2="335" y2="360" />
  </g>
  
  <!-- Paper Binder Punch Holes -->
  <circle cx="35" cy="50" r="6" fill="#EDF8FF" stroke="#C4E2F5" stroke-width="1" />
  <circle cx="35" cy="200" r="6" fill="#EDF8FF" stroke="#C4E2F5" stroke-width="1" />
  <circle cx="35" cy="350" r="6" fill="#EDF8FF" stroke="#C4E2F5" stroke-width="1" />
  
  <!-- Metallic Paper Clip Visual at the top -->
  <path d="M 260 5 L 290 5 C 295 5 295 25 290 25 L 270 25 C 265 25 265 12 275 12 L 285 12 C 288 12 288 18 285 18 L 275 18" 
        stroke="#5C7284" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-15 280 15)" />
</svg>
