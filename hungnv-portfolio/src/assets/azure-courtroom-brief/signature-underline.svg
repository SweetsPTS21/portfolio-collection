<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" fill="none">
  <!-- Glowing handwriting approval flourish -->
  <defs>
    <filter id="glowInk" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Flourish Ink path -->
  <path d="M 10 35 C 50 15, 80 50, 110 25 C 140 0, 160 55, 195 30 C 230 5, 250 45, 290 35" 
        stroke="#1E78C8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowInk)" />
        
  <!-- Minor cross tick -->
  <path d="M 245 15 L 265 45" stroke="#8ABBEA" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
  <circle cx="290" cy="35" r="3" fill="#12304A" />
</svg>
