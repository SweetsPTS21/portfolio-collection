<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="bookGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Open Book of Constitution / Law -->
  <g stroke="#1E78C8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#bookGlow)" fill="#EDF8FF" fill-opacity="0.3">
    <!-- Hardcover spine underneath -->
    <path d="M 30 160 C 100 170 100 170 170 160 L 180 40 C 100 50 100 50 20 40 Z" fill="#1E78C8" fill-opacity="0.08" />
    
    <!-- Left open page -->
    <path d="M 100 45 C 65 35, 45 42, 25 40 L 25 150 C 45 152, 65 145, 100 155 Z" fill="#FFFFFF" />
    
    <!-- Right open page -->
    <path d="M 100 45 C 135 35, 155 42, 175 40 L 175 150 C 155 152, 135 145, 100 155 Z" fill="#FFFFFF" />
    
    <!-- Book bookmark ribbon -->
    <path d="M 100 45 L 100 180 L 110 172 L 120 180 L 120 42" fill="#D9576A" stroke="#D9576A" stroke-width="1.5" />
    
    <!-- Lined details on pages -->
    <line x1="38" y1="65" x2="85" y2="65" stroke="#C4E2F5" stroke-width="1.5" />
    <line x1="38" y1="85" x2="80" y2="85" stroke="#C4E2F5" stroke-width="1.5" />
    <line x1="38" y1="105" x2="85" y2="105" stroke="#C4E2F5" stroke-width="1.5" />
    <line x1="38" y1="125" x2="70" y2="125" stroke="#C4E2F5" stroke-width="1.5" />
    
    <line x1="115" y1="65" x2="162" y2="65" stroke="#C4E2F5" stroke-width="1.5" />
    <line x1="115" y1="85" x2="157" y2="85" stroke="#C4E2F5" stroke-width="1.5" />
    <line x1="115" y1="105" x2="162" y2="105" stroke="#C4E2F5" stroke-width="1.5" />
    <line x1="115" y1="125" x2="147" y2="125" stroke="#C4E2F5" stroke-width="1.5" />
  </g>
</svg>
