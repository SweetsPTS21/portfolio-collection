<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="sealShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#12304A" flood-opacity="0.3" />
    </filter>
    <radialGradient id="waxGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#D9576A" />
      <stop offset="70%" stop-color="#B2394C" />
      <stop offset="100%" stop-color="#7C1F2E" />
    </radialGradient>
    <linearGradient id="goldGlint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0BD" />
      <stop offset="50%" stop-color="#D9AE38" />
      <stop offset="100%" stop-color="#805C0A" />
    </linearGradient>
  </defs>
  
  <!-- Outer Irregular Wax Spread -->
  <path d="M 100 20 C 130 18 150 25 170 50 C 190 75 175 110 178 135 C 180 160 155 175 130 178 C 105 180 80 188 55 174 C 30 160 22 135 20 100 C 18 65 35 40 55 28 C 75 15 80 22 100 20 Z" 
        fill="url(#waxGrad)" filter="url(#sealShadow)" />
        
  <!-- Inner Circle Inner Edge -->
  <circle cx="100" cy="100" r="58" stroke="#7C1F2E" stroke-width="2" />
  <circle cx="100" cy="100" r="54" stroke="url(#goldGlint)" stroke-width="3" fill="none" opacity="0.85" />
  
  <!-- Ribbon Elements extending underneath -->
  <g opacity="0.9">
    <path d="M 75 150 L 50 220 L 70 215 L 90 190 Z" fill="#1E78C8" />
    <path d="M 125 150 L 150 220 L 130 215 L 110 190 Z" fill="#8ABBEA" />
  </g>
  
  <!-- Inscribed Text on Seal -->
  <path id="textPath" d="M 58 100 A 42 42 0 1 1 142 100" fill="none" />
  <text font-family="'Source Sans 3', sans-serif" font-size="10" font-weight="bold" fill="url(#goldGlint)" letter-spacing="1.5">
    <textPath href="#textPath" startOffset="50%" text-anchor="middle">ACADEMIC INTEGRITY</textPath>
  </text>
  
  <!-- Seal Centerpiece: Balance and Ribbon -->
  <g transform="translate(78, 76) scale(0.14)" stroke="url(#goldGlint)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Mini scale silhouette inside wax -->
    <line x1="150" y1="240" x2="150" y2="60" />
    <line x1="80" y1="90" x2="220" y2="90" />
    <line x1="80" y1="90" x2="60" y2="160" />
    <line x1="80" y1="90" x2="100" y2="160" />
    <path d="M 50 160 Q 80 170 110 160 Z" />
    <line x1="220" y1="90" x2="200" y2="160" />
    <line x1="220" y1="90" x2="240" y2="160" />
    <path d="M 190 160 Q 220 170 250 160 Z" />
    <circle cx="150" cy="50" r="10" />
  </g>
  
  <text x="100" y="142" font-family="'Crimson Pro', serif" font-size="9" fill="url(#goldGlint)" font-weight="bold" text-anchor="middle" letter-spacing="1">VERITAS</text>
</svg>
