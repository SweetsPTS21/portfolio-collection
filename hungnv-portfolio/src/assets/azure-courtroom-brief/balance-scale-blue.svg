<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Glow Layer -->
  <g filter="url(#blueGlow)" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
    <!-- Stand -->
    <line x1="150" y1="260" x2="150" y2="70" />
    <path d="M 120 260 L 180 260 M 110 268 L 190 268" />
    <path d="M 150 70 C 135 70 135 50 150 50 C 165 50 165 70 150 70 Z" />
    
    <!-- Beam -->
    <path d="M 70 95 Q 150 85 230 95" />
    <circle cx="150" cy="90" r="5" />
    
    <!-- Left Scale Pan -->
    <line x1="70" y1="95" x2="45" y2="185" />
    <line x1="70" y1="95" x2="95" y2="185" />
    <path d="M 40 185 Q 70 200 100 185 Z" fill="#1E78C8" fill-opacity="0.1" />
    
    <!-- Right Scale Pan -->
    <line x1="230" y1="95" x2="205" y2="185" />
    <line x1="230" y1="95" x2="255" y2="185" />
    <path d="M 200 185 Q 230 200 260 185 Z" fill="#1E78C8" fill-opacity="0.1" />
  </g>
  
  <!-- High Contrast Crisp Front Layer -->
  <g stroke="#1E78C8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stand Base -->
    <path d="M 115 260 L 185 260" />
    <path d="M 130 260 L 135 250 L 165 250 L 170 260" />
    
    <!-- Shaft -->
    <line x1="150" y1="250" x2="150" y2="85" />
    
    <!-- Top Finial -->
    <circle cx="150" cy="70" r="8" fill="#EDF8FF" stroke-width="3" />
    <circle cx="150" cy="55" r="4" fill="#1E78C8" />
    
    <!-- Cross Beam -->
    <path d="M 60 100 L 150 90 L 240 100" />
    <circle cx="150" cy="90" r="4" fill="#1E78C8" />
    
    <!-- Left Pan Assembly -->
    <line x1="60" y1="100" x2="35" y2="190" />
    <line x1="60" y1="100" x2="85" y2="190" />
    <path d="M 30 190 Q 60 202 90 190 Z" fill="#FFFFFF" stroke-width="2.5" />
    
    <!-- Right Pan Assembly -->
    <line x1="240" y1="100" x2="215" y2="190" />
    <line x1="240" y1="100" x2="265" y2="190" />
    <path d="M 210 190 Q 240 202 270 190 Z" fill="#FFFFFF" stroke-width="2.5" />
  </g>
  
  <!-- Tiny sparkles -->
  <circle cx="60" cy="80" r="2" fill="#8ABBEA" />
  <circle cx="240" cy="85" r="1.5" fill="#8ABBEA" />
  <circle cx="150" cy="130" r="2.5" fill="#8ABBEA" />
</svg>
