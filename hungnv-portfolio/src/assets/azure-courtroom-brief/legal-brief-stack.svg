<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="5" stdDeviation="6" flood-color="#12304A" flood-opacity="0.15" />
    </filter>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F4FAFF" />
    </linearGradient>
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8ABBEA" />
      <stop offset="100%" stop-color="#1E78C8" />
    </linearGradient>
  </defs>
  <!-- Background Shadow Folder -->
  <rect x="60" y="80" width="280" height="170" rx="8" fill="url(#folderGrad)" opacity="0.4" filter="url(#shadow)" transform="rotate(-3 200 165)" />
  
  <!-- Middle Sheet -->
  <rect x="70" y="65" width="260" height="180" rx="6" fill="url(#paperGrad)" filter="url(#shadow)" transform="rotate(2 200 155)" />
  <line x1="95" y1="95" x2="305" y2="95" stroke="#C4E2F5" stroke-width="2" transform="rotate(2 200 155)" />
  <line x1="95" y1="120" x2="285" y2="120" stroke="#C4E2F5" stroke-width="1.5" transform="rotate(2 200 155)" />
  <line x1="95" y1="145" x2="305" y2="145" stroke="#C4E2F5" stroke-width="1.5" transform="rotate(2 200 155)" />
  <line x1="95" y1="170" x2="245" y2="170" stroke="#C4E2F5" stroke-width="1.5" transform="rotate(2 200 155)" />

  <!-- Top Legal Folder Cover -->
  <rect x="80" y="50" width="240" height="190" rx="6" fill="url(#paperGrad)" filter="url(#shadow)" />
  <!-- Folder tab -->
  <path d="M 80 50 L 140 50 L 155 65 L 80 65 Z" fill="#1E78C8" />
  <text x="90" y="61" fill="#FFFFFF" font-family="'Source Sans 3', sans-serif" font-size="9" font-weight="bold" letter-spacing="1">CASE BRIEF</text>
  
  <!-- Content Lines on Cover -->
  <rect x="100" y="90" width="100" height="14" rx="2" fill="#C4E2F5" opacity="0.6" />
  <rect x="100" y="115" width="200" height="6" rx="1" fill="#12304A" opacity="0.15" />
  <rect x="100" y="130" width="180" height="6" rx="1" fill="#12304A" opacity="0.15" />
  <rect x="100" y="145" width="190" height="6" rx="1" fill="#12304A" opacity="0.15" />
  
  <line x1="100" y1="175" x2="300" y2="175" stroke="#12304A" stroke-width="2" stroke-dasharray="5 5" opacity="0.3" />
  <text x="100" y="200" fill="#1E78C8" font-family="'Crimson Pro', serif" font-size="14" font-weight="bold">⚖️ COURT EVIDENCE</text>
  <text x="100" y="218" fill="#5C7284" font-family="'Source Sans 3', sans-serif" font-size="9" letter-spacing="0.5">VERIFIED IN BRIEF CO-FILES</text>
</svg>
