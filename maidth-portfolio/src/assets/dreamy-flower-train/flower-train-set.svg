<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-label="Dreamy flower train with locomotive and carriages">
  <defs>
    <linearGradient id="locoBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#f4e8ff"/>
      <stop offset="1" stop-color="#c7a8ff"/>
    </linearGradient>
    <linearGradient id="roseMetal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9ecb"/>
      <stop offset="1" stop-color="#b88cff"/>
    </linearGradient>
    <linearGradient id="windowGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a7c7ff"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff7c5"/>
      <stop offset="0.55" stop-color="#ffe48a"/>
      <stop offset="1" stop-color="#ff9ecb" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#5b3c87" flood-opacity="0.28"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffe48a" flood-opacity="0.55"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <g opacity="0.75">
      <ellipse cx="142" cy="122" rx="54" ry="26" fill="#ffffff"/>
      <ellipse cx="90" cy="130" rx="44" ry="22" fill="#ffffff"/>
      <ellipse cx="207" cy="112" rx="68" ry="30" fill="#ffffff"/>
      <ellipse cx="274" cy="128" rx="48" ry="22" fill="#ffffff"/>
    </g>

    <g class="train-track">
      <path d="M70 334 H1215" stroke="#2e2348" stroke-width="10" stroke-linecap="round" opacity="0.72"/>
      <path d="M88 362 H1195" stroke="#b88cff" stroke-width="9" stroke-linecap="round" opacity="0.78"/>
      <g stroke="#ffe48a" stroke-width="8" stroke-linecap="round" opacity="0.92">
        <path d="M140 322 l-30 52"/><path d="M250 322 l-30 52"/><path d="M360 322 l-30 52"/>
        <path d="M470 322 l-30 52"/><path d="M580 322 l-30 52"/><path d="M690 322 l-30 52"/>
        <path d="M800 322 l-30 52"/><path d="M910 322 l-30 52"/><path d="M1020 322 l-30 52"/>
        <path d="M1130 322 l-30 52"/>
      </g>
    </g>

    <g class="locomotive">
      <path d="M132 247 C124 211 137 185 173 176 H263 C295 176 317 198 317 231 V303 H111 C111 278 118 258 132 247Z" fill="url(#locoBody)" stroke="#6b4aa3" stroke-width="6"/>
      <path d="M270 130 H354 C393 130 423 161 423 200 V303 H299 V188 C299 157 319 130 270 130Z" fill="url(#locoBody)" stroke="#6b4aa3" stroke-width="6"/>
      <rect x="326" y="159" width="64" height="68" rx="14" fill="url(#windowGlow)" stroke="#ffffff" stroke-width="6"/>
      <path d="M155 166 h97 l-18 -44 h-58Z" fill="url(#roseMetal)" stroke="#6b4aa3" stroke-width="5"/>
      <rect x="184" y="96" width="42" height="56" rx="13" fill="#2e2348"/>
      <path d="M174 92 h62 l14 -32 h-90Z" fill="url(#roseMetal)" stroke="#6b4aa3" stroke-width="5"/>
      <circle cx="113" cy="241" r="32" fill="url(#lampGlow)" filter="url(#glow)"/>
      <circle cx="115" cy="241" r="14" fill="#ffe48a" stroke="#fff" stroke-width="4"/>
      <path d="M76 282 l46 -18 v39 H72Z" fill="#ff9ecb" stroke="#6b4aa3" stroke-width="5"/>
      <path d="M402 246 h64 v57 h-64Z" fill="#ff9ecb" stroke="#6b4aa3" stroke-width="5"/>
    </g>

    <g class="carriage carriage-one" transform="translate(456 0)">
      <rect x="0" y="171" width="238" height="132" rx="28" fill="url(#locoBody)" stroke="#6b4aa3" stroke-width="6"/>
      <path d="M24 154 H214 l24 35 H0Z" fill="url(#roseMetal)" stroke="#6b4aa3" stroke-width="5"/>
      <rect x="30" y="201" width="55" height="52" rx="16" fill="url(#windowGlow)" stroke="#fff" stroke-width="5"/>
      <rect x="102" y="201" width="55" height="52" rx="16" fill="url(#windowGlow)" stroke="#fff" stroke-width="5"/>
      <rect x="174" y="201" width="34" height="78" rx="14" fill="#e8d6ff" stroke="#fff" stroke-width="5"/>
      <path d="M-12 244 h-45" stroke="#6b4aa3" stroke-width="10" stroke-linecap="round"/>
      <path d="M250 244 h43" stroke="#6b4aa3" stroke-width="10" stroke-linecap="round"/>
    </g>

    <g class="carriage carriage-two" transform="translate(740 0)">
      <rect x="0" y="171" width="238" height="132" rx="28" fill="url(#locoBody)" stroke="#6b4aa3" stroke-width="6"/>
      <path d="M24 154 H214 l24 35 H0Z" fill="url(#roseMetal)" stroke="#6b4aa3" stroke-width="5"/>
      <rect x="30" y="201" width="55" height="52" rx="16" fill="url(#windowGlow)" stroke="#fff" stroke-width="5"/>
      <rect x="102" y="201" width="55" height="52" rx="16" fill="url(#windowGlow)" stroke="#fff" stroke-width="5"/>
      <rect x="174" y="201" width="34" height="78" rx="14" fill="#e8d6ff" stroke="#fff" stroke-width="5"/>
      <path d="M250 244 h43" stroke="#6b4aa3" stroke-width="10" stroke-linecap="round"/>
    </g>

    <g class="carriage carriage-three" transform="translate(1024 0)">
      <rect x="0" y="171" width="172" height="132" rx="28" fill="url(#locoBody)" stroke="#6b4aa3" stroke-width="6"/>
      <path d="M20 154 H152 l20 35 H0Z" fill="url(#roseMetal)" stroke="#6b4aa3" stroke-width="5"/>
      <rect x="28" y="201" width="50" height="52" rx="16" fill="url(#windowGlow)" stroke="#fff" stroke-width="5"/>
      <rect x="96" y="201" width="50" height="52" rx="16" fill="url(#windowGlow)" stroke="#fff" stroke-width="5"/>
      <path d="M172 225 c35 12 54 34 57 65 h-57Z" fill="#ff9ecb" stroke="#6b4aa3" stroke-width="5"/>
    </g>

    <g class="flower-decor" fill="#ff9ecb" stroke="#ffffff" stroke-width="3">
      <circle cx="254" cy="156" r="13"/><circle cx="278" cy="144" r="10"/><circle cx="297" cy="163" r="12"/>
      <circle cx="524" cy="164" r="11"/><circle cx="548" cy="154" r="9"/><circle cx="568" cy="170" r="11"/>
      <circle cx="830" cy="164" r="11"/><circle cx="856" cy="154" r="9"/><circle cx="876" cy="172" r="11"/>
      <circle cx="1102" cy="164" r="11"/><circle cx="1126" cy="154" r="9"/><circle cx="1146" cy="172" r="11"/>
    </g>
    <g class="leaf-decor" fill="#9fe7d0">
      <path d="M244 174 c22 14 44 14 66 0 c-20 28 -48 30 -66 0Z"/>
      <path d="M516 180 c22 14 44 14 66 0 c-20 28 -48 30 -66 0Z"/>
      <path d="M822 180 c22 14 44 14 66 0 c-20 28 -48 30 -66 0Z"/>
      <path d="M1094 180 c22 14 44 14 66 0 c-20 28 -48 30 -66 0Z"/>
    </g>

    <g class="wheels" fill="#2e2348" stroke="#ffffff" stroke-width="5">
      <circle cx="166" cy="313" r="34"/><circle cx="250" cy="313" r="34"/><circle cx="356" cy="313" r="34"/>
      <circle cx="526" cy="313" r="31"/><circle cx="636" cy="313" r="31"/>
      <circle cx="810" cy="313" r="31"/><circle cx="920" cy="313" r="31"/>
      <circle cx="1080" cy="313" r="31"/><circle cx="1156" cy="313" r="31"/>
    </g>
    <g class="wheel-hubs" fill="#ffe48a" stroke="#6b4aa3" stroke-width="4">
      <circle cx="166" cy="313" r="13"/><circle cx="250" cy="313" r="13"/><circle cx="356" cy="313" r="13"/>
      <circle cx="526" cy="313" r="12"/><circle cx="636" cy="313" r="12"/>
      <circle cx="810" cy="313" r="12"/><circle cx="920" cy="313" r="12"/>
      <circle cx="1080" cy="313" r="12"/><circle cx="1156" cy="313" r="12"/>
    </g>

    <g class="sparkles" fill="#ffffff" opacity="0.95">
      <path d="M440 120 l8 20 21 7 -21 7 -8 20 -8 -20 -21 -7 21 -7Z"/>
      <path d="M704 132 l6 15 16 5 -16 6 -6 15 -6 -15 -16 -6 16 -5Z"/>
      <path d="M995 124 l7 18 19 6 -19 7 -7 18 -7 -18 -19 -7 19 -6Z"/>
    </g>
  </g>
</svg>
