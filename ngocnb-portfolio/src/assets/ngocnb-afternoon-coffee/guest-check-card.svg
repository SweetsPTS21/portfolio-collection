<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 220" width="100%" height="100%">
  <!-- Guest Check receipt outline -->
  <rect x="5" y="5" width="140" height="210" rx="3" fill="#FFFDF7" stroke="#E6DCD3" stroke-width="2" />
  <!-- Receipt Header lines -->
  <line x1="15" y1="20" x2="135" y2="20" stroke="#8B7355" stroke-width="2" />
  <text x="50%" y="35" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#8B7355" text-anchor="middle">GUEST CHECK</text>
  <line x1="15" y1="42" x2="135" y2="42" stroke="#8B7355" stroke-width="1" />
  <!-- Table representation -->
  <line x1="15" y1="60" x2="135" y2="60" stroke="#8B7355" stroke-width="0.5" stroke-dasharray="2,2" />
  <line x1="15" y1="80" x2="135" y2="80" stroke="#8B7355" stroke-width="0.5" stroke-dasharray="2,2" />
  <line x1="15" y1="100" x2="135" y2="100" stroke="#8B7355" stroke-width="0.5" stroke-dasharray="2,2" />
  <line x1="15" y1="120" x2="135" y2="120" stroke="#8B7355" stroke-width="0.5" stroke-dasharray="2,2" />
  <line x1="15" y1="140" x2="135" y2="140" stroke="#8B7355" stroke-width="0.5" stroke-dasharray="2,2" />
  <line x1="15" y1="160" x2="135" y2="160" stroke="#8B7355" stroke-width="0.5" stroke-dasharray="2,2" />
  <!-- Bottom price representation -->
  <rect x="15" y="180" width="120" height="25" fill="#F5F0EB" rx="2" />
  <text x="25" y="196" font-family="'Inter', sans-serif" font-size="9" fill="#2C1E16">TAX INCLUDED</text>
  <!-- Coffee bean watermark in background -->
  <path d="M120 130 c5 5 15 5 15 15 s-5 15 -15 15 s-15 -5 -15 -15 s5 -15 15 -15" fill="#6F4E37" opacity="0.06" />
</svg>
