<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Outer cup rim -->
  <circle cx="60" cy="60" r="48" fill="#FFFDF7" stroke="#D4C4B7" stroke-width="3" />
  <!-- Coffee liquid -->
  <circle cx="60" cy="60" r="40" fill="#6F4E37" />
  <!-- Cream foam / Latte Art base -->
  <circle cx="60" cy="60" r="32" fill="#E6DCD3" opacity="0.9" />
  <!-- Cat face Latte Art -->
  <g fill="#6F4E37">
    <!-- Cat head outline in foam -->
    <path d="M40 70 C40 55 45 45 60 45 C75 45 80 55 80 70 C80 82 40 82 40 70 Z" opacity="0.85" />
    <polygon points="42,50 40,32 50,47" opacity="0.85" />
    <polygon points="78,50 80,32 70,47" opacity="0.85" />
    <!-- Eyes -->
    <circle cx="50" cy="60" r="2.5" fill="#2C1E16" />
    <circle cx="70" cy="60" r="2.5" fill="#2C1E16" />
    <!-- Nose / Mouth -->
    <polygon points="60,65 58,63 62,63" fill="#2C1E16" />
    <path d="M57 68 Q60 70 63 68" fill="none" stroke="#2C1E16" stroke-width="1.5" stroke-linecap="round" />
    <!-- Cheeks (pink foam) -->
    <circle cx="45" cy="66" r="3" fill="#FFCAD8" opacity="0.7" />
    <circle cx="75" cy="66" r="3" fill="#FFCAD8" opacity="0.7" />
  </g>
  <!-- Cup handle -->
  <path d="M108 45 C116 45 120 52 120 60 C120 68 116 75 108 75" fill="none" stroke="#FFFDF7" stroke-width="6" />
  <path d="M108 45 C116 45 120 52 120 60 C120 68 116 75 108 75" fill="none" stroke="#D4C4B7" stroke-width="2" />
</svg>
