<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" width="100%" height="100%">
  <!-- Deco ribbon waves -->
  <path d="M0 30 Q30 10 60 30 T120 30" fill="none" stroke="#D4C4B7" stroke-width="4" stroke-linecap="round" opacity="0.6" />
  <path d="M10 35 Q40 15 70 35 T110 25" fill="none" stroke="#8B7355" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  <!-- A cute ribbon bow -->
  <g transform="translate(60, 30)" fill="#6F4E37">
    <!-- Left loop -->
    <path d="M0 0 C-15 -15 -25 5 0 0" stroke="#4E3629" stroke-width="1" />
    <!-- Right loop -->
    <path d="M0 0 C15 -15 25 5 0 0" stroke="#4E3629" stroke-width="1" />
    <!-- Center knot -->
    <circle cx="0" cy="0" r="3" fill="#2C1E16" />
    <!-- Tails -->
    <path d="M-2 2 L-10 18 L-5 18 Z" />
    <path d="M2 2 L10 18 L5 18 Z" />
  </g>
</svg>
