<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 190" width="100%" height="100%">
  <!-- Polaroid white base frame -->
  <rect x="5" y="5" width="150" height="180" fill="#FCFAF2" rx="2" stroke="#E6DCD3" stroke-width="1.5" />
  <!-- Shadow/Border on inside picture frame -->
  <rect x="15" y="15" width="130" height="125" fill="#2C1E16" rx="1" />
  <!-- Bottom note script line placeholder -->
  <line x1="25" y1="155" x2="135" y2="155" stroke="#D4C4B7" stroke-width="1" stroke-dasharray="3,3" />
  <line x1="45" y1="168" x2="115" y2="168" stroke="#D4C4B7" stroke-width="1" stroke-dasharray="3,3" />
  <!-- Coffee spill ring effect in the corner -->
  <circle cx="140" cy="170" r="14" fill="none" stroke="#6F4E37" stroke-width="1" opacity="0.12" />
</svg>
