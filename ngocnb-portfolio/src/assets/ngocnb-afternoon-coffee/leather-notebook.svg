<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Open leather binder background -->
  <rect x="5" y="5" width="190" height="140" rx="8" fill="#4E3629" stroke="#2C1E16" stroke-width="3" />
  <!-- Left paper page -->
  <rect x="15" y="10" width="80" height="130" rx="2" fill="#FAF5EF" />
  <!-- Right paper page -->
  <rect x="105" y="10" width="80" height="130" rx="2" fill="#FAF5EF" />
  <!-- Binder metal ring spine -->
  <rect x="96" y="8" width="8" height="134" fill="#8B7355" rx="1" />
  <circle cx="100" cy="25" r="4" fill="#D4C4B7" />
  <circle cx="100" cy="55" r="4" fill="#D4C4B7" />
  <circle cx="100" cy="85" r="4" fill="#D4C4B7" />
  <circle cx="100" cy="115" r="4" fill="#D4C4B7" />
  <!-- Spine shadows -->
  <line x1="94" y1="10" x2="94" y2="140" stroke="#E6DCD3" stroke-width="2" />
  <line x1="106" y1="10" x2="106" y2="140" stroke="#E6DCD3" stroke-width="2" />
</svg>
