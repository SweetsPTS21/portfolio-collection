<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <defs>
    <linearGradient id="sun-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEBB5" stop-opacity="0.25" />
      <stop offset="60%" stop-color="#FFEBB5" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFEBB5" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Sunlight shafts -->
  <polygon points="0,0 120,0 350,600 200,600" fill="url(#sun-gradient)" />
  <polygon points="150,0 220,0 400,450 350,600" fill="url(#sun-gradient)" opacity="0.7" />
</svg>
