<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Left floating feather -->
  <g transform="translate(20, 30) rotate(-15) scale(0.6)">
    <path d="M 0 0 C 12 -12, 18 -6, 24 12 C 18 10, 8 8, 0 0 Z" fill="#FFFFFF" opacity="0.65" filter="url(#feather-blur)" />
    <path d="M 0 0 C 8 -16, 22 -14, 24 12 C 16 8, 4 4, 0 0 Z" fill="#FFFFFF" opacity="0.45" filter="url(#feather-blur)" />
    <path d="M -2 -2 Q 10 -2 25 13" stroke="#FFAEC9" stroke-width="0.8" fill="none" opacity="0.5" />
  </g>

  <!-- Right smaller floating feather -->
  <g transform="translate(75, 60) rotate(25) scale(0.4)">
    <path d="M 0 0 C 12 -12, 18 -6, 24 12 C 18 10, 8 8, 0 0 Z" fill="#FFFFFF" opacity="0.7" filter="url(#feather-blur)" />
    <path d="M 0 0 C 8 -16, 22 -14, 24 12 C 16 8, 4 4, 0 0 Z" fill="#FFFFFF" opacity="0.5" filter="url(#feather-blur)" />
    <path d="M -2 -2 Q 10 -2 25 13" stroke="#FFAEC9" stroke-width="0.8" fill="none" opacity="0.6" />
  </g>

  <defs>
    <filter id="feather-blur">
      <feGaussianBlur stdDeviation="0.8" />
    </filter>
  </defs>
</svg>
