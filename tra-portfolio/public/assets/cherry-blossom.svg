<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Branch -->
  <path d="M20 180 Q60 120 100 80 Q130 50 160 30" stroke="#C5A0A8" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M100 80 Q85 60 70 45" stroke="#C5A0A8" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M130 55 Q150 40 165 25" stroke="#C5A0A8" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Blossom 1 (full) -->
  <g transform="translate(95,72) rotate(15)">
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#F4B8CE" opacity="0.9"/>
    <ellipse cx="11" cy="-4" rx="7" ry="10" fill="#F2A9C4" opacity="0.85" transform="rotate(72)"/>
    <ellipse cx="7" cy="10" rx="7" ry="10" fill="#F6C4D5" opacity="0.88" transform="rotate(144)"/>
    <ellipse cx="-7" cy="10" rx="7" ry="10" fill="#F4B8CE" opacity="0.85" transform="rotate(216)"/>
    <ellipse cx="-11" cy="-4" rx="7" ry="10" fill="#F2A9C4" opacity="0.88" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="4" fill="#FFE0EB"/>
    <circle cx="0" cy="0" r="1.5" fill="#E8A0BF"/>
  </g>

  <!-- Blossom 2 -->
  <g transform="translate(145,38) rotate(-10)">
    <ellipse cx="0" cy="-10" rx="6" ry="8.5" fill="#F6C4D5" opacity="0.85"/>
    <ellipse cx="9.5" cy="-3" rx="6" ry="8.5" fill="#F4B8CE" opacity="0.8" transform="rotate(72)"/>
    <ellipse cx="6" cy="8.5" rx="6" ry="8.5" fill="#F2A9C4" opacity="0.82" transform="rotate(144)"/>
    <ellipse cx="-6" cy="8.5" rx="6" ry="8.5" fill="#F6C4D5" opacity="0.8" transform="rotate(216)"/>
    <ellipse cx="-9.5" cy="-3" rx="6" ry="8.5" fill="#F4B8CE" opacity="0.82" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="3.5" fill="#FFE0EB"/>
    <circle cx="0" cy="0" r="1.2" fill="#E8A0BF"/>
  </g>

  <!-- Blossom 3 (small) -->
  <g transform="translate(68,48) rotate(25)">
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#F4B8CE" opacity="0.78"/>
    <ellipse cx="7.5" cy="-2.5" rx="5" ry="7" fill="#F6C4D5" opacity="0.75" transform="rotate(72)"/>
    <ellipse cx="4.6" cy="6.4" rx="5" ry="7" fill="#F2A9C4" opacity="0.78" transform="rotate(144)"/>
    <ellipse cx="-4.6" cy="6.4" rx="5" ry="7" fill="#F4B8CE" opacity="0.75" transform="rotate(216)"/>
    <ellipse cx="-7.5" cy="-2.5" rx="5" ry="7" fill="#F6C4D5" opacity="0.78" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="3" fill="#FFE8F0"/>
    <circle cx="0" cy="0" r="1" fill="#E8A0BF"/>
  </g>

  <!-- Blossom 4 (bud, small) -->
  <g transform="translate(160, 58) rotate(5)">
    <ellipse cx="0" cy="-7" rx="4" ry="6" fill="#F6C4D5" opacity="0.7"/>
    <ellipse cx="6.5" cy="-2" rx="4" ry="6" fill="#F4B8CE" opacity="0.68" transform="rotate(72)"/>
    <ellipse cx="4" cy="5.6" rx="4" ry="6" fill="#F2A9C4" opacity="0.7" transform="rotate(144)"/>
    <ellipse cx="-4" cy="5.6" rx="4" ry="6" fill="#F6C4D5" opacity="0.68" transform="rotate(216)"/>
    <ellipse cx="-6.5" cy="-2" rx="4" ry="6" fill="#F4B8CE" opacity="0.7" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFE0EB"/>
  </g>

  <!-- Fallen petals -->
  <ellipse cx="40" cy="165" rx="5" ry="8" fill="#F4B8CE" opacity="0.4" transform="rotate(-30 40 165)"/>
  <ellipse cx="170" cy="150" rx="4" ry="6" fill="#F6C4D5" opacity="0.35" transform="rotate(20 170 150)"/>
  <ellipse cx="25" cy="140" rx="3.5" ry="5.5" fill="#F2A9C4" opacity="0.3" transform="rotate(45 25 140)"/>
</svg>
