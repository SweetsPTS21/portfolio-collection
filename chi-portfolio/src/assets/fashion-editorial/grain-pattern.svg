<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Editorial grain pattern">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 .18"/>
    </feComponentTransfer>
  </filter>
  <rect width="240" height="240" fill="#FFF8F5"/>
  <rect width="240" height="240" filter="url(#noise)" opacity=".55"/>
</svg>
